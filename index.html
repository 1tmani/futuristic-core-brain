<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V47 | SONIC SINGULARITY</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&display=swap' rel='stylesheet'>
<style>
:root{ --c1:#00f0ff; --bg: #000; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.hud{ position:fixed; top:40px; left:40px; z-index:100; pointer-events:none; border-left:2px solid var(--c1); padding-left:20px; }
.btn-layer{ position:fixed; bottom:40px; right:40px; z-index:200; display:flex; gap:10px; }
.btn{ background:rgba(255,255,255,0.05); border:1px solid var(--c1); color:#fff; padding:15px 30px; cursor:pointer; font-family:'Orbitron'; letter-spacing:2px; }
.btn:hover{ background:var(--c1); color:#000; }
</style>
</head>
<body>
<canvas id='v47-canvas'></canvas>
<div class='hud'>
    <div style='font-size:10px; letter-spacing:5px;'>SONIC_FIDELITY: MAX</div>
    <div style='font-size:10px; letter-spacing:5px;'>EQ_CHAIN: BASS_PRO_TREBLE</div>
</div>
<div class='btn-layer'>
    <button class='btn' onclick='sonicEngine.ignite()'>ENGAGE CORE AUDIO</button>
</div>
<script>
const canvas=document.getElementById('v47-canvas'), ctx=canvas.getContext('2d');
let w, h, time=0, particles=[];
function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
resize(); addEventListener('resize',resize);
for(let i=0; i<300; i++) particles.push({ x:Math.random()*w, y:Math.random()*h, z:Math.random()*w });

const sonicEngine = {
    ctx: null, bass: null, treble: null, master: null,
    ignite: function() {
        if(this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.master = this.ctx.createGain();
        this.master.gain.setValueAtTime(0.8, this.ctx.currentTime);

        this.bass = this.ctx.createBiquadFilter();
        this.bass.type = 'lowshelf';
        this.bass.frequency.value = 200;
        this.bass.gain.value = 15;

        this.treble = this.ctx.createBiquadFilter();
        this.treble.type = 'highshelf';
        this.treble.frequency.value = 3000;
        this.treble.gain.value = 10;

        const comp = this.ctx.createDynamicsCompressor();
        this.master.connect(this.bass).connect(this.treble).connect(comp).connect(this.ctx.destination);
        this.playUniverseTune();
    },
    playUniverseTune: function() {
        const notes = [261.63, 329.63, 392.00, 523.25];
        let now = this.ctx.currentTime;
        notes.forEach((freq, i) => {
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + i*0.5);
            g.gain.setValueAtTime(0, now + i*0.5);
            g.gain.linearRampToValueAtTime(0.1, now + i*0.5 + 0.1);
            g.gain.exponentialRampToValueAtTime(0.0001, now + i*0.5 + 0.4);
            osc.connect(g).connect(this.master);
            osc.start(now + i*0.5); osc.stop(now + i*0.5 + 0.5);
        });
        setTimeout(() => this.playUniverseTune(), 4000);
    }
};

function draw(){
    time+=0.01; ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
    particles.forEach(p => {
        p.z-=5; if(p.z<=0) p.z=w;
        let sc=400/p.z, x=(p.x-w/2)*sc+w/2, y=(p.y-h/2)*sc+h/2;
        ctx.fillStyle=`hsla(${time*50},80%,70%,${1-p.z/w})`;
        ctx.fillRect(x,y,sc,sc);
    });
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(w/2-50,h/2-50,100,100);
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
