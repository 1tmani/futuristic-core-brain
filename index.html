<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>CORE-BRAIN V9 | META-EVOLUTION</title>
    <style>
        :root { --c1: #00f2ff; --c2: #7000ff; --bg: #000; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'monospace'; overflow: hidden; transition: background 2s ease; }
        #master-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { position: absolute; inset: 0; z-index: 1; }
        .hud-v9 { position: fixed; top: 20px; left: 20px; z-index: 100; color: var(--c1); text-transform: uppercase; letter-spacing: 3px; font-size: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid var(--c1); }
        .universe-label { position: absolute; font-size: 8rem; opacity: 0.1; font-weight: 900; pointer-events: none; width: 100%; text-align: center; top: 40%; z-index: 0; }
        .dynamic-shape { position: absolute; border: 1px solid var(--c1); opacity: 0.5; transition: all 5s ease-in-out; }
    </style>
</head>
<body>
    <div class='hud-v9'>
        <div>ENGINE: META_EVOLUTION_V9</div>
        <div id='evo-count'>EVOLUTION: 1</div>
        <div id='status'>STATUS: GENERATING_NEW_UNIVERSE...</div>
    </div>
    <div id='master-container'>
        <div id='universe-name' class='universe-label'>ORIGIN</div>
        <canvas id='neural-net'></canvas>
    </div>

    <script>
        const canvas = document.getElementById('neural-net');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [], evo = 1;

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 4; this.vy = (Math.random() - 0.5) * 4;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x<0||this.x>w) this.vx*=-1; if(this.y<0||this.y>h) this.vy*=-1;
            }
        }

        for(let i=0; i<200; i++) particles.push(new Particle());

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,w,h);
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--c1');
            particles.forEach((p, i) => {
                p.update();
                ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
                for(let j=i+1; j<particles.length; j++) {
                    let p2 = particles[j], d = Math.hypot(p.x-p2.x, p.y-p2.y);
                    if(d < 100) { ctx.globalAlpha = 1 - d/100; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(draw);
        }
        draw();

        function evolve() {
            evo++;
            document.getElementById('evo-count').innerText = 'EVOLUTION: ' + evo;
            const hue = Math.floor(Math.random() * 360);
            document.documentElement.style.setProperty('--c1', 'hsl(' + hue + ', 100%, 50%)');
            const container = document.getElementById('master-container');
            const oldShapes = document.querySelectorAll('.dynamic-shape');
            oldShapes.forEach(s => s.remove());
            for(let i=0; i<5; i++) {
                let s = document.createElement('div');
                s.className = 'dynamic-shape';
                let size = Math.random() * 300 + 50;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.left = Math.random() * 80 + '%';
                s.style.top = Math.random() * 80 + '%';
                s.style.borderRadius = Math.random() > 0.5 ? '50%' : '0%';
                s.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
                container.appendChild(s);
            }
            document.getElementById('universe-name').innerText = 'UNIVERSE_' + Math.random().toString(36).substring(7).toUpperCase();
        }
        setInterval(evolve, 5000);
    </script>
</body>
</html>
