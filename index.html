<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>CORE-BRAIN V14 | STABILIZED</title>
    <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&display=swap' rel='stylesheet'>
    <style>
        :root { --c1: #00f2ff; --c2: #7000ff; --accent: #fff; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Michroma', sans-serif; overflow: hidden; }

        /* Layer 0: Parallax Void */
        #void-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #050505 0%, #000 100%); z-index: -2; }

        /* Layer 1: Frosted Glass HUD */
        .glass-hud {
            position: fixed; top: 30px; left: 30px; padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 4px;
            z-index: 100; letter-spacing: 2px; font-size: 10px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .status-line { display: flex; align-items: center; margin-bottom: 8px; }
        .dot { width: 6px; height: 6px; background: var(--c1); border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px var(--c1); }

        /* Layer 2: Stabilized Neural Engine */
        #stabilized-canvas { position: fixed; inset: 0; z-index: 1; }

        /* Layer 3: The Core Singularity */
        .core-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; text-align: center; pointer-events: none;
        }
        .core-text {
            font-size: 4rem; font-weight: 900; font-family: 'Orbitron', sans-serif; letter-spacing: 40px;
            background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.5));
        }

        /* Aesthetic Noise Layer */
        .noise-overlay { position: fixed; inset: 0; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.03; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>
    <div id='void-bg'></div>
    <div class='noise-overlay'></div>

    <div class='glass-hud'>
        <div class='status-line'><div class='dot'></div> SYSTEM: STABILIZED_V14</div>
        <div class='status-line'><div class='dot' style='background:var(--c2);box-shadow:0 0 10px var(--c2);'></div> SYNC: 100%_FIDELITY</div>
        <div id='coords'>X: 000 Y: 000</div>
    </div>

    <div class='core-center'>
        <h1 class='core-text'>CORE</h1>
    </div>

    <canvas id='stabilized-canvas'></canvas>

    <script>
        const canvas = document.getElementById('stabilized-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [], mouse = {x: null, y: null};

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Neuron {
            constructor() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.8; this.vy = (Math.random() - 0.5) * 0.8;
                this.radius = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > w) this.vx *= -1; if(this.y < 0 || this.y > h) this.vy *= -1;

                if(mouse.x) {
                    let dx = mouse.x - this.x, dy = mouse.y - this.y;
                    let d = Math.hypot(dx, dy);
                    if(d < 200) { this.x -= dx * 0.01; this.y -= dy * 0.01; }
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
            }
        }

        for(let i=0; i<200; i++) particles.push(new Neuron());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                for(let j=i+1; j<particles.length; j++) {
                    let p2 = particles[j], d = Math.hypot(p.x-p2.x, p.y-p2.y);
                    if(d < 120) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - d/120})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            document.getElementById('coords').innerText = `X: ${e.clientX} Y: ${e.clientY}`;
        });
    </script>
</body>
</html>
