<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V62 | NEURAL-NET DEFENDER</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
<style>
:root{ --c1:#00f0ff; --c2:#8a2eff; --c3:#ff2e88; --bg: #000; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Orbitron'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.hud{ position:fixed; inset:0; z-index:100; pointer-events:none; padding:40px; display:flex; flex-direction:column; justify-content:space-between; }
.stat-box{ background:rgba(0,0,0,0.8); border-left:2px solid var(--c1); padding:15px 25px; font-size:10px; letter-spacing:3px; backdrop-filter:blur(30px); }
.overlay{ position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; transition:0.5s; }
.btn{ background:transparent; border:1px solid var(--c1); color:#fff; padding:20px 50px; cursor:pointer; font-family:'Orbitron'; letter-spacing:5px; transition:0.4s; font-size:12px; text-transform:uppercase; pointer-events:all; }
.btn:hover{ background:var(--c1); color:#000; box-shadow:0 0 50px var(--c1); }
#score-val{ color:var(--c3); font-weight:900; }
</style>
</head>
<body>
<canvas id='game-canvas'></canvas>
<div class='hud'>
    <div style='display:flex; justify-content:space-between;'>
        <div class='stat-box'>INTEGRITY: <span id='hp-val'>100</span>%</div>
        <div class='stat-box'>SCORE: <span id='score-val'>0</span></div>
    </div>
</div>
<div id='start-screen' class='overlay'>
    <h1 style='letter-spacing:20px; font-size:3rem; margin-bottom:40px;'>NEURAL DEFENDER</h1>
    <button class='btn' onclick='engine.start()'>Initialize Core</button>
</div>
<script>
const canvas=document.getElementById('game-canvas'), ctx=canvas.getContext('2d');
let w, h, time=0, isPlaying=false, score=0, hp=100;
let player={x:0, y:0, r:20}, bullets=[], enemies=[];
function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; } resize(); addEventListener('resize',resize);
window.addEventListener('mousemove', e => { player.x=e.clientX; player.y=e.clientY; });
window.addEventListener('mousedown', () => { if(isPlaying) bullets.push({x:player.x, y:player.y, v:15}); });
const engine = {
    start() {
        document.getElementById('start-screen').style.opacity='0';
        setTimeout(()=>document.getElementById('start-screen').style.display='none', 500);
        isPlaying=true; hp=100; score=0; enemies=[]; bullets=[];
    },
    over() {
        isPlaying=false;
        document.getElementById('start-screen').style.display='flex';
        document.getElementById('start-screen').style.opacity='1';
        document.querySelector('#start-screen h1').innerText = 'CORE BREACHED';
    }
};
function spawn() {
    if(!isPlaying) return;
    const side = Math.floor(Math.random()*4);
    let x, y;
    if(side==0){x=Math.random()*w; y=-50} 
    else if(side==1){x=Math.random()*w; y=h+50}
    else if(side==2){x=-50; y=Math.random()*h}
    else {x=w+50; y=Math.random()*h}
    enemies.push({x, y, s:2+(score/500)}); 
    setTimeout(spawn, Math.max(200, 1000-(score/10)));
}
spawn();
function draw(){
    time+=0.01; ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);
    if(!isPlaying) { requestAnimationFrame(draw); return; }
    ctx.shadowBlur=20; ctx.shadowColor=player.r > 20 ? 'red' : 'cyan';
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.fill();
    bullets.forEach((b,i) => {
        b.y -= b.v; if(b.y < 0) bullets.splice(i,1);
        ctx.fillStyle='var(--c1)'; ctx.fillRect(b.x-2, b.y, 4, 15);
    });
    enemies.forEach((en,i) => {
        const dx=player.x-en.x, dy=player.y-en.y, dist=Math.hypot(dx,dy);
        en.x += (dx/dist)*en.s; en.y += (dy/dist)*en.s;
        ctx.fillStyle='var(--c3)'; ctx.beginPath(); ctx.arc(en.x, en.y, 8, 0, Math.PI*2); ctx.fill();
        bullets.forEach((b, bi) => {
            if(Math.hypot(b.x-en.x, b.y-en.y) < 20) {
                enemies.splice(i,1); bullets.splice(bi,1); score+=10;
                document.getElementById('score-val').innerText = score;
            }
        });
        if(dist < 20) { hp-=1; document.getElementById('hp-val').innerText = hp; if(hp<=0) engine.over(); }
    });
    requestAnimationFrame(draw);
} draw();
</script>
</body>
</html>
