<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V51 | X-16 QUANTUM MOTOR</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
<style>
:root{ --c1:#00f0ff; --c2:#ff2e88; --bg: #000; --thrust: 0; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.hud-v51{ position:fixed; top:40px; left:40px; z-index:100; border-left:2px solid var(--c1); padding-left:20px; pointer-events:none; text-transform:uppercase; }
.motor-box{ position:fixed; bottom:40px; right:40px; z-index:100; border:1px solid var(--c1); padding:20px; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); }
.btn{ background:transparent; border:1px solid var(--c1); color:#fff; padding:15px 30px; cursor:pointer; font-family:'Orbitron'; letter-spacing:3px; transition:0.3s; margin-top:10px; }
.btn:hover{ background:var(--c1); color:#000; box-shadow:0 0 30px var(--c1); }
#voice-status{ font-size:10px; color:var(--c2); letter-spacing:2px; }
.car-16d{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:200px; height:100px; z-index:50; transform-style:preserve-3d; pointer-events:none; transition: 0.1s linear; }
.car-body{ position:absolute; inset:0; border:2px solid var(--c1); box-shadow: 0 0 20px var(--c1); background:rgba(0,240,255,0.1); }
</style>
</head>
<body>
<canvas id='universe'></canvas>
<div class='hud-v51'>
    <div style='font-size:10px; opacity:0.6;'>ENGINE: X-16_QUANTUM</div>
    <div style='font-size:14px;'>VELOCITY: <span id='v-val'>0</span> km/s</div>
    <div id='voice-status'>VOICE_UPLINK: STANDBY</div>
</div>
<div class='car-16d' id='car-node'>
    <div class='car-body' id='car-fx'></div>
</div>
<div class='motor-box'>
    <div style='font-size:9px; margin-bottom:5px;'>MOTOR_CONTROL_INTERFACE</div>
    <button class='btn' onclick='engine.ignite()'>IGNITE MOTORS</button><br>
    <button class='btn' onclick='engine.boost()'>THRUST BOOST</button>
</div>
<script>
const canvas=document.getElementById('universe'), ctx=canvas.getContext('2d');
let w, h, time=0, velocity=0, thrust=0, isLive=false;
const speech = window.speechSynthesis;

function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; } resize(); addEventListener('resize',resize);

const engine = {
    ignite() {
        isLive = true;
        this.speak("System Ignite. X-16 Quantum motors engaged. Neural running machine online.");
        document.getElementById('voice-status').innerText = "VOICE_UPLINK: ACTIVE";
    },
    boost() {
        thrust += 5;
        this.speak("Thrust maximized. Entering 16-D hyper-space.");
    },
    speak(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.pitch = 0.5; msg.rate = 0.9; speech.speak(msg);
    }
};

function draw(){
    time+=0.01; ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2;
    
    if(isLive) {
        velocity += (thrust - velocity) * 0.05;
        thrust *= 0.98;
        document.getElementById('v-val').innerText = (velocity * 100).toFixed(0);
        
        const car = document.getElementById('car-node');
        const fx = document.getElementById('car-fx');
        car.style.transform = `translate(-50%, -50%) rotateX(${60 + Math.sin(time*2)*10}deg) rotateZ(${time*20}deg) scale(${1 + velocity*0.1})`;
        fx.style.boxShadow = `0 0 ${20 + velocity*50}px var(--c1)`;
    }

    for(let i=0; i<50; i++) {
        let z = (i*40 + time*100*velocity) % w;
        let sc = 400/(w-z);
        ctx.fillStyle = `hsla(180, 100%, 50%, ${sc*0.1})`;
        ctx.fillRect(cx + (i-25)*50*sc, cy + 100*sc, 2, 2);
    }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
