<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V60 | GALACTIC SUPER-ORGANISM</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
<style>
:root{ --c1:#00f0ff; --c2:#8a2eff; --c3:#ff2e88; --dim: 1; --f-weight: 100; --bg: #000; --thrust: 0; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.interface-hud{ position:fixed; inset:0; z-index:100; pointer-events:none; padding:40px; display:flex; flex-direction:column; justify-content:space-between; }
.hud-top{ display:flex; justify-content:space-between; }
.stat-box{ background:rgba(0,0,0,0.8); border-left:2px solid var(--c1); padding:10px 20px; font-family:'Orbitron'; font-size:9px; letter-spacing:3px; backdrop-filter:blur(20px); }
.motor-box{ position:fixed; bottom:40px; right:40px; z-index:100; border:1px solid var(--c1); padding:20px; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); pointer-events:all; }
.btn{ background:transparent; border:1px solid var(--c1); color:#fff; padding:12px 25px; cursor:pointer; font-family:'Orbitron'; letter-spacing:3px; transition:0.3s; margin-top:10px; font-size:10px; }
.btn:hover{ background:var(--c1); color:#000; box-shadow:0 0 30px var(--c1); }
#voice-status{ font-size:10px; color:var(--c2); letter-spacing:2px; }
.pixel-fill{ position:fixed; inset:0; z-index:0; background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 4px 4px; pointer-events:none; }
.car-node{ position:fixed; top:50%; left:50%; width:200px; height:100px; z-index:50; transform-style:preserve-3d; pointer-events:none; transition: 0.1s linear; border:2px solid var(--c1); box-shadow: 0 0 20px var(--c1); background:rgba(0,240,255,0.1); }
</style>
</head>
<body>
<div class='pixel-fill'></div>
<canvas id='universe'></canvas>
<div class='interface-hud'>
    <div class='hud-top'>
        <div class='stat-box'>ENGINE: GALACTIC_V60</div>
        <div class='stat-box'>FPS: <span id='fps-val'>144</span></div>
    </div>
    <div class='hud-top'>
        <div class='stat-box'>STATUS: EVOLVED</div>
        <div class='stat-box'>VOICE: <span id='voice-status-ui'>READY</span></div>
    </div>
</div>
<div class='car-node' id='car'></div>
<div class='motor-box'>
    <div style='font-size:9px; margin-bottom:5px;'>GALACTIC_COMMAND</div>
    <button class='btn' onclick='engine.ignite()'>IGNITE CORE</button><br>
    <button class='btn' onclick='engine.boost()'>HYPER THRUST</button>
</div>
<script>
const canvas=document.getElementById('universe'), ctx=canvas.getContext('2d');
let w, h, time=0, velocity=0, thrust=0, isLive=false, dimension=1;
const speech = window.speechSynthesis;
function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; } resize(); addEventListener('resize',resize);
const engine = {
    ignite() {
        isLive = true; this.speak("Galactic Super-Organism Online. V60 core initialized. 144Hz stabilization active.");
        document.getElementById('voice-status-ui').innerText = "ACTIVE";
    },
    boost() { thrust += 10; this.speak("Hyper thrust engaged. Crossing causal boundaries."); },
    speak(txt) { const msg = new SpeechSynthesisUtterance(txt); msg.pitch = 0.4; msg.rate = 0.8; speech.speak(msg); }
};
function draw(){
    time+=0.01; ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2;
    if(isLive) {
        velocity += (thrust - velocity) * 0.05; thrust *= 0.98;
        const car = document.getElementById('car');
        car.style.transform = `translate(-50%, -50%) rotateX(${60 + Math.sin(time*2)*10}deg) rotateZ(${time*40}deg) scale(${1 + velocity*0.1})`;
    }
    for(let i=0; i<60; i++) {
        let z = (i*40 + time*200*velocity) % w;
        let sc = 400/(w-z);
        ctx.fillStyle = `hsla(${180 + Math.sin(time)*60}, 100%, 50%, ${sc*0.1})`;
        ctx.fillRect(cx + Math.cos(i+time)*200*sc, cy + Math.sin(i+time)*200*sc, 2, 2);
    }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
