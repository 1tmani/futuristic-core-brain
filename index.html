<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Core-Brain | Next-Gen Evolution</title>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #7000ff; --deep-bg: #020202; }
        body, html { margin: 0; padding: 0; background: var(--deep-bg); color: #fff; font-family: sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        #dna-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }

        .hud-overlay { position: fixed; top: 20px; right: 20px; width: 250px; background: rgba(0, 242, 255, 0.1); border-left: 2px solid var(--neon-cyan); padding: 15px; font-family: monospace; font-size: 0.8rem; z-index: 100; backdrop-filter: blur(5px); }
        .hud-scan { height: 2px; background: var(--neon-cyan); width: 100%; position: absolute; top: 0; left: 0; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .core-sphere { width: 300px; height: 300px; background: radial-gradient(circle, var(--neon-purple) 0%, transparent 70%); border-radius: 50%; filter: blur(40px); animation: breathe 5s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.5); opacity: 0.7; } }

        .glitch-text { font-size: 4rem; font-weight: bold; background: linear-gradient(90deg, #fff, var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 10px var(--neon-cyan); text-align: center; }
    </style>
</head>
<body>
    <canvas id='dna-canvas'></canvas>
    
    <div class='hud-overlay'>
        <div class='hud-scan'></div>
        <div>CORE_STATUS: ACTIVE</div>
        <div>NEURAL_SYNC: 98.4%</div>
        <div>DNA_RENDERING: 8K_PROCESSED</div>
        <div id='data-stream'>[ PROCESSING... ]</div>
    </div>

    <section class='hero'>
        <div class='core-sphere'></div>
        <h1 class='glitch-text'>CORE BRAIN V2</h1>
        <p style='letter-spacing: 10px;'>BIOMETRIC EVOLUTION ENGAGED</p>
    </section>

    <script>
        const canvas = document.getElementById('dna-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Dot {
            constructor(i) {
                this.i = i;
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.angle = Math.random() * Math.PI * 2;
            }
            draw() {
                this.angle += 0.02;
                let s = Math.sin(this.angle + this.i * 0.1) * 50;
                ctx.fillStyle = this.i % 2 === 0 ? '#00f2ff' : '#7000ff';
                ctx.beginPath();
                ctx.arc(this.x + s, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<200; i++) particles.push(new Dot(i));

        function animate() {
            ctx.clearRect(0,0,w,h);
            particles.forEach(p => p.draw());
            document.getElementById('data-stream').innerText = '[ SYNCING: ' + Math.random().toFixed(4) + ' ]';
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
