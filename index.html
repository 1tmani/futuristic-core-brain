<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V42 | ABSOLUTE VISUAL FIDELITY</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=Syncopate:wght@400;700&display=swap' rel='stylesheet'>
<style>
:root{
     --c1:#00f0ff; --c2:#8a2eff; --c3:#ff2e88; --c4:#00ff75; --dim: 1; 
     --font-w: 100; --entry-op: 1; --glow: 0 0 20px var(--c1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{ background:#000; color:#fff; font-family:'Michroma',sans-serif; overflow-x:hidden; scroll-behavior:smooth; }

canvas{ position:fixed; inset:0; z-index:1; mix-blend-mode: screen; }

/* REVOLVING RINGS ARCHITECTURE */
.core-rings{ 
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    width:400px; height:400px; z-index:5; pointer-events:none; perspective:1000px;
}
.ring{ 
    position:absolute; inset:0; border:1px solid var(--c1); border-radius:50%; 
    box-shadow: var(--glow); transition: 0.5s; animation: spin linear infinite;
}
@keyframes spin { from{ transform:rotateX(70deg) rotateZ(0deg); } to{ transform:rotateX(70deg) rotateZ(360deg); } }

/* PREMIUM STARTING MENU */
.starting-menu{ 
    position:fixed; top:0; left:0; width:100%; height:100vh; z-index:1000;
    background: radial-gradient(circle at center, rgba(0,0,0,0.4), #000);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity: var(--entry-op); transition: 2s cubic-bezier(0.19, 1, 0.22, 1);
}
.menu-title{ font-family:'Syncopate'; font-weight:700; letter-spacing:25px; font-size:4rem; text-shadow: 0 0 30px #fff; text-transform:uppercase; }
.start-btn{ 
    margin-top:50px; background:transparent; border:1px solid var(--c1); color:#fff; 
    padding:20px 60px; font-family:'Orbitron'; letter-spacing:10px; cursor:pointer;
    transition:0.4s; backdrop-filter:blur(10px); box-shadow: 0 0 15px rgba(0,240,255,0.2);
}
.start-btn:hover{ background:var(--c1); color:#000; box-shadow: 0 0 40px var(--c1); transform: scale(1.1); }

/* PIXEL FILLING & SHADING */
.pixel-fill{ position:fixed; inset:0; z-index:0; background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 6px 6px; }
.dimmer{ position:fixed; inset:0; background: radial-gradient(circle, transparent, #000 150%); z-index:2; pointer-events:none; }

</style>
</head>
<body>
<div class='pixel-fill'></div>
<div class='dimmer'></div>
<canvas id='universe'></canvas>

<div class='core-rings' id='rings-system'>
    <div class='ring' style='animation-duration:10s; width:100%; height:100%; opacity:0.4;'></div>
    <div class='ring' style='animation-duration:15s; width:80%; height:80%; top:10%; left:10%; opacity:0.3; border-color:var(--c2);'></div>
    <div class='ring' style='animation-duration:20s; width:60%; height:60%; top:20%; left:20%; opacity:0.2; border-color:var(--c3);'></div>
</div>

<main class='starting-menu' id='menu'>
    <h1 class='menu-title'>NIGHTINGALE</h1>
    <button class='start-btn' onclick='enter()'>ENGAGE CORE</button>
</main>

<script>
const canvas = document.getElementById('universe');
const ctx = canvas.getContext('2d');
let w, h, time=0, particles=[];

function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
resize(); addEventListener('resize',resize);

for(let i=0;i<400;i++){
    particles.push({ x:Math.random()*w, y:Math.random()*h, z:Math.random()*w, r:Math.random()*2+1, color:Math.random()*360 });
}

function enter(){
    document.documentElement.style.setProperty('--entry-op', '0');
    setTimeout(() => document.getElementById('menu').style.display = 'none', 2000);
}

function draw(){
    time += 0.01;
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0,0,w,h);
    const cx = w/2, cy = h/2;

    particles.forEach(p => {
        p.z -= 5;
        if(p.z <= 0) p.z = w;
        let scale = 400/p.z;
        let x2d = (p.x - cx) * scale + cx;
        let y2d = (p.y - cy) * scale + cy;
        ctx.fillStyle = `hsla(${p.color}, 100%, 70%, ${1 - p.z/w})`;
        ctx.beginPath();
        ctx.arc(x2d, y2d, scale * 2, 0, Math.PI*2);
        ctx.fill();
    });
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
