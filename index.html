<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE RACER | 4D HYPER-SPACE</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&display=swap' rel='stylesheet'>
<style>
:root{
     --c1:#00f0ff; --c2:#8a2eff; --c3:#ff2e88; --vignette: rgba(0,0,0,0.8);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
     background:#000; color:#fff; font-family:'Michroma',sans-serif; overflow:hidden;
}
canvas{
     position:fixed; inset:0; z-index:0; filter: contrast(1.2) brightness(1.1);
}
.temporal-overlay{
     position:fixed; inset:0; z-index:1; pointer-events:none;
     background: repeating-linear-gradient(0deg, rgba(0,240,255,0.03) 0px, transparent 2px);
     mix-blend-mode: color-dodge;
}
header{
     position:fixed; top:0; width:100%; z-index:100;
     backdrop-filter:blur(30px); background:rgba(0,0,0,.4);
     border-bottom:1px solid rgba(255,255,255,.05);
}
nav{
     display:flex; justify-content:space-between; padding:25px 50px; align-items:center;
}
.logo{
     font-family:'Orbitron',sans-serif; letter-spacing:15px; font-weight:900; 
     background: linear-gradient(90deg, #fff, var(--c1), #fff);
     -webkit-background-clip: text; -webkit-text-fill-color: transparent;
     filter: drop-shadow(0 0 10px var(--c1));
}
.stats-container{
     position:fixed; bottom:50px; left:50px; z-index:10; border-left:1px solid var(--c1);
     padding:20px; background:rgba(0,0,0,0.7); backdrop-filter:blur(15px);
     font-family:'Orbitron'; font-size:10px; letter-spacing:4px; line-height:2.5;
}
.dimension-tag{
     position:fixed; top:120px; right:50px; color:var(--c1); font-size:9px; letter-spacing:10px; text-transform:uppercase; writing-mode: vertical-rl; opacity:0.5;
}
</style>
</head>
<body>
<div class='temporal-overlay'></div>
<div class='dimension-tag'>Dimension: 4D_Hyper_Space</div>
<canvas id='render-4d'></canvas>
<header>
<nav>
<div class='logo'>HYPER CORE</div>
<div style='font-size:10px; opacity:0.5;'>NEURAL_LINK: STABLE</div>
</nav>
</header>
<section class='stats-container'>
    TEMPORAL_DRIVE: <span id='drive'>ACTIVE</span><br>
    DIMENSIONAL_DEPTH: <span id='depth'>4.000</span><br>
    SYNC_STATUS: CORE_STABILIZED
</section>
<script>
const canvas=document.getElementById('render-4d');
const ctx=canvas.getContext('2d');
let w,h, time=0, particles=[];

function resize(){
     w=canvas.width=innerWidth;
     h=canvas.height=innerHeight;
}
resize(); addEventListener('resize',resize);

for(let i=0;i<200;i++){
     particles.push({ x:Math.random()*w, y:Math.random()*h, z:Math.random()*w, r:Math.random()*2+1 });
}

function draw4D(){
     time += 0.005;
     ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);

     const cx=w/2, cy=h/2;
     
     // 4D Fractal Grid Warp
     ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--c1')+'22';
     ctx.lineWidth=1;
     for(let i=0; i<40; i++){
          let dist = i * 20;
          let warp = Math.sin(time + i * 0.1) * 50;
          ctx.beginPath();
          ctx.ellipse(cx, cy, dist + warp, dist * 0.5 + warp, Math.sin(time*0.5), 0, Math.PI*2);
          ctx.stroke();
     }

     // Hyper-Space Particle Movement
     particles.forEach(p => {
          p.z -= 10;
          if(p.z <= 0) p.z = w;
          
          let scale = 400 / p.z;
          let x2d = (p.x - cx) * scale + cx;
          let y2d = (p.y - cy) * scale + cy;
          
          let alpha = 1 - (p.z / w);
          ctx.fillStyle=`rgba(255,255,255,${alpha})`;
          ctx.beginPath(); ctx.arc(x2d, y2d, p.r * scale, 0, Math.PI*2); ctx.fill();
          
          // Dynamic trailing for 4D feel
          if(scale > 2){
               ctx.strokeStyle=`rgba(0,240,255,${alpha*0.3})`;
               ctx.beginPath(); ctx.moveTo(x2d, y2d); ctx.lineTo(cx, cy); ctx.stroke();
          }
     });

     requestAnimationFrame(draw4D);
}
draw4D();

// Self-Evolution: Change Dimension Depth value
setInterval(() => {
     const depth = (4 + Math.random()*0.1).toFixed(3);
     document.getElementById('depth').textContent = depth;
}, 1000);
</script>
</body>
</html>
