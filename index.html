<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V41 | MASTER NEXUS</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&family=Syncopate:wght@400;700&display=swap' rel='stylesheet'>
<style>
:root{
     --c1:#00f0ff; --c2:#8a2eff; --c3:#ff2e88; --c4:#00ff75; --dim: 1; --f-weight: 100; --f-width: 100%;
     --bg: #000; --entry-op: 1; --nexus-op: 0; --night-op: 1;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{ background:var(--bg); color:#fff; font-family:'Michroma',sans-serif; overflow-x:hidden; scroll-behavior:smooth; }

canvas{ position:fixed; inset:0; z-index:1; mix-blend-mode: screen; }

/* GLOBAL HUD SYSTEM */
.nexus-hud{
    position:fixed; top:30px; left:50%; transform:translateX(-50%); z-index:2000; 
    display:flex; gap:20px; background:rgba(255,255,255,0.05); padding:10px 30px; 
    border:1px solid var(--border); backdrop-filter:blur(20px); border-radius:50px;
}
.hud-btn{
    background:transparent; border:none; color:#fff; font-family:'Orbitron'; 
    font-size:10px; cursor:pointer; letter-spacing:3px; opacity:0.5; transition:0.4s;
}
.hud-btn.active{ opacity:1; color:var(--c1); text-shadow:0 0 10px var(--c1); }

/* NIGHTINGALE LAYER */
#nightingale-overlay { opacity: var(--night-op); transition: 1s; pointer-events: none; }
.nightingale-node{ position:fixed; width:2px; height:2px; background:#fff; border-radius:50%; box-shadow:0 0 10px var(--c3); z-index:5; }

/* 8D NEXUS LAYER */
#nexus-overlay { opacity: var(--nexus-op); transition: 1s; pointer-events: none; }

.pixel-fill{ 
    position:fixed; inset:0; z-index:0; 
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px); 
    background-size: 4px 4px; pointer-events:none; 
}

.main-title-container{ 
    position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; 
    justify-content:center; z-index:10; pointer-events:none; 
}
#main-title{ 
    font-family:'Orbitron'; font-weight:var(--f-weight); font-stretch: var(--f-width); 
    font-size:clamp(3rem, 15vw, 10rem); letter-spacing:calc(var(--dim)*15px); 
    text-shadow: 0 0 30px var(--c1);
}
</style>
</head>
<body>
<div class='pixel-fill'></div>
<canvas id='universe-v41'></canvas>

<div class='nexus-hud'>
    <button class='hud-btn active' id='btn-night' onclick='switchMode("night")'>NIGHTINGALE</button>
    <button class='hud-btn' id='btn-nexus' onclick='switchMode("nexus")'>8D NEXUS</button>
</div>

<div class='main-title-container'>
    <h1 id='main-title'>CORE</h1>
    <p id='mode-label' style='font-family:"JetBrains Mono"; font-size:10px; letter-spacing:10px; opacity:0.4;'>ARCH_V40_STABLE</p>
</div>

<script>
const canvas = document.getElementById('universe-v41');
const ctx = canvas.getContext('2d');
let w, h, time=0, particles=[], isNexus=false;

function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
resize(); addEventListener('resize',resize);

for(let i=0;i<350;i++){
    particles.push({ x:Math.random()*w, y:Math.random()*h, z:Math.random()*w, r:Math.random()*2+1, color:Math.random()*360 });
}

function switchMode(mode){
    isNexus = (mode === 'nexus');
    document.getElementById('btn-night').classList.toggle('active', !isNexus);
    document.getElementById('btn-nexus').classList.toggle('active', isNexus);
    document.getElementById('mode-label').textContent = isNexus ? 'ARCH_V39_HYPER' : 'ARCH_V40_STABLE';
    document.documentElement.style.setProperty('--nexus-op', isNexus ? '1' : '0');
    document.documentElement.style.setProperty('--night-op', isNexus ? '0' : '1');
}

function draw(){
    time += 0.01;
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0,0,w,h);
    
    const cx = w/2, cy = h/2;
    
    // Dynamic Scaling Logic based on Mode
    const dimension = isNexus ? (1 + (Math.sin(time*0.5)+1)*3.5) : 1;
    document.documentElement.style.setProperty('--f-weight', isNexus ? Math.floor(100 + (Math.sin(time)+1)*400) : 100);
    document.documentElement.style.setProperty('--f-width', isNexus ? (Math.floor(50 + (Math.cos(time)+1)*50) + '%') : '100%');
    document.documentElement.style.setProperty('--dim', dimension);

    particles.forEach(p => {
        p.z -= (isNexus ? (5 * dimension) : 5);
        if(p.z <= 0) p.z = w;
        let scale = 400/p.z;
        let x2d = (p.x - cx) * scale + cx;
        let y2d = (p.y - cy) * scale + cy;
        
        ctx.fillStyle = `hsla(${isNexus ? (p.color + time*50)%360 : p.color}, 100%, 70%, ${1 - p.z/w})`;
        ctx.beginPath();
        ctx.arc(x2d, y2d, scale * (isNexus ? dimension : 1.5), 0, Math.PI*2);
        ctx.fill();

        if(scale > 3) {
            ctx.strokeStyle = `hsla(${p.color}, 100%, 50%, 0.1)`;
            ctx.beginPath(); ctx.moveTo(x2d, y2d); ctx.lineTo(cx, cy); ctx.stroke();
        }
    });

    requestAnimationFrame(draw);
}
draw();

// Nightingale Procedural Beats (Only active when not in pure nexus mode)
setInterval(() => {
    if(isNexus) return;
    const node = document.createElement('div');
    node.className = 'nightingale-node';
    node.style.left = Math.random()*100 + 'vw';
    node.style.top = Math.random()*100 + 'vh';
    document.body.appendChild(node); 
    setTimeout(() => node.remove(), 2000);
}, 400);
</script>
</body>
</html>
