<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V48 | NEURAL LABYRINTH</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&display=swap' rel='stylesheet'>
<style>
:root{ --c1:#00f0ff; --c2:#ff2e88; --bg: #000; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.hud{ position:fixed; top:40px; left:40px; z-index:100; border-left:2px solid var(--c1); padding-left:20px; pointer-events:none; }
.game-overlay{ position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); transition:0.5s; }
.btn{ background:transparent; border:1px solid var(--c1); color:#fff; padding:15px 40px; cursor:pointer; font-family:'Orbitron'; letter-spacing:5px; transition:0.3s; }
.btn:hover{ background:var(--c1); color:#000; box-shadow:0 0 30px var(--c1); }
#score-val{ color:var(--c1); font-family:'Orbitron'; }
</style>
</head>
<body>
<canvas id='game-canvas'></canvas>
<div class='hud'>
    <div style='font-size:10px; letter-spacing:5px;'>MISSION: KINETIC_ESCAPE</div>
    <div style='font-size:10px; letter-spacing:5px;'>SCORE: <span id='score-val'>0</span></div>
</div>
<div id='overlay' class='game-overlay'>
    <h1 style='font-family:Orbitron; letter-spacing:15px;'>NEURAL LABYRINTH</h1>
    <button class='btn' onclick='game.start()'>INITIALIZE CORE</button>
</div>
<script>
const canvas=document.getElementById('game-canvas'), ctx=canvas.getContext('2d');
let w, h, time=0, score=0, isPlaying=false;
let walls = [];
let player = { x:0, y:0, r:15 };

function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
resize(); addEventListener('resize',resize);

const audio = {
    ctx: null, master: null,
    init() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.master = this.ctx.createGain();
        this.master.connect(this.ctx.destination);
    },
    pulse() {
        if(!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime+0.2);
        osc.connect(g).connect(this.master);
        osc.start(); osc.stop(this.ctx.currentTime+0.2);
    }
};

const game = {
    start() {
        document.getElementById('overlay').style.opacity = '0';
        setTimeout(()=>document.getElementById('overlay').style.display='none', 500);
        audio.init();
        isPlaying = true;
        score = 0;
        walls = [];
    },
    over() {
        isPlaying = false;
        document.getElementById('overlay').style.display='flex';
        document.getElementById('overlay').style.opacity = '1';
        document.querySelector('#overlay h1').innerText = 'CORE BREACHED';
    }
};

window.addEventListener('mousemove', e => { player.x = e.clientX; player.y = e.clientY; });

function draw(){
    time+=0.01; ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);
    if(!isPlaying) { requestAnimationFrame(draw); return; }

    if(Math.random() < 0.05) {
        walls.push({ x: w, y: Math.random()*h, w: 20, h: h*0.3, speed: 5 + (score/100) });
    }

    walls.forEach((wall, i) => {
        wall.x -= wall.speed;
        ctx.fillStyle = 'rgba(0, 240, 255, 0.3)';
        ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
        
        if(player.x > wall.x && player.x < wall.x + wall.w && player.y > wall.y && player.y < wall.y + wall.h) {
            game.over();
        }
        if(wall.x < -20) { walls.splice(i, 1); score += 10; document.getElementById('score-val').innerText = score; audio.pulse(); }
    });

    ctx.shadowBlur = 20; ctx.shadowColor = '#00f0ff';
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
