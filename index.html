<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>CORE-BRAIN V13 | HYPER-REACTIVE</title>
    <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&family=Michroma&display=swap' rel='stylesheet'>
    <style>
        :root { --c1: #00f2ff; --c2: #7000ff; --energy: 0; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; overflow: hidden; font-family: 'Syncopate', sans-serif; }

        /* The Living Canvas */
        #hyper-canvas { position: fixed; inset: 0; z-index: 1; filter: contrast(1.2) brightness(1.1); }

        /* HUD: Neural Analytics */
        .hud-v13 { position: fixed; top: 40px; left: 40px; z-index: 100; font-family: 'Michroma', sans-serif; text-transform: uppercase; letter-spacing: 4px; pointer-events: none; }
        .energy-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 10px; position: relative; }
        .energy-fill { position: absolute; height: 100%; background: var(--c1); width: var(--energy); box-shadow: 0 0 15px var(--c1); transition: width 0.1s linear; }

        /* Central Singularity */
        .core-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; text-align: center; pointer-events: none; }
        .living-title { font-size: 6rem; font-weight: 900; margin: 0; letter-spacing: 30px; animation: breathe-text 3s infinite ease-in-out; text-shadow: 0 0 20px var(--c1); }

        @keyframes breathe-text {
            0%, 100% { transform: scale(1); letter-spacing: 30px; filter: blur(0px); }
            50% { transform: scale(1.05); letter-spacing: 40px; filter: blur(2px); }
        }

        /* Scanline Interference */
        .noise { position: fixed; inset: 0; z-index: 200; pointer-events: none; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.05; mix-blend-mode: overlay; }
    </style>
</head>
<body>
    <div class='noise'></div>
    <div class='hud-v13'>
        <div>System Evolution: V13</div>
        <div>Core Connectivity: <span id='conn-val'>0</span>%</div>
        <div class='energy-bar'><div class='energy-fill' id='energy-bar'></div></div>
    </div>

    <div class='core-container'>
        <h1 class='living-title' id='title'>CORE</h1>
    </div>

    <canvas id='hyper-canvas'></canvas>

    <script>
        const canvas = document.getElementById('hyper-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [], mouse = {x: null, y: null, v: 0};

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Neuron {
            constructor() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 2 + 1; this.energy = 0;
            }
            update() {
                if (mouse.x) {
                    let dx = mouse.x - this.x, dy = mouse.y - this.y;
                    let d = Math.hypot(dx, dy);
                    if (d < 250) {
                        this.vx += dx * 0.002; this.vy += dy * 0.002;
                        this.energy = Math.min(this.energy + 0.1, 1);
                    } else { this.energy *= 0.95; }
                }
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.98; this.vy *= 0.98;
                if(this.x<0||this.x>w) this.vx*=-1; if(this.y<0||this.y>h) this.vy*=-1;
            }
            draw() {
                let glow = this.energy * 20;
                ctx.shadowBlur = glow; ctx.shadowColor = '#00f2ff';
                ctx.fillStyle = `rgba(0, 242, 255, ${0.2 + this.energy})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size + (this.energy * 2), 0, Math.PI*2); ctx.fill();
            }
        }

        for(let i=0; i<300; i++) particles.push(new Neuron());

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
            let totalEnergy = 0;
            
            particles.forEach((p, i) => {
                p.update(); p.draw();
                totalEnergy += p.energy;
                for(let j=i+1; j<particles.length; j++) {
                    let p2 = particles[j], d = Math.hypot(p.x-p2.x, p.y-p2.y);
                    if(d < 100) {
                        ctx.strokeStyle = `rgba(112, 0, 255, ${(1 - d/100) * (p.energy + p2.energy)})`;
                        ctx.lineWidth = 0.5 + (p.energy * 2);
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                }
            });

            let avgEnergy = (totalEnergy / particles.length) * 1000;
            document.documentElement.style.setProperty('--energy', avgEnergy + '%');
            document.getElementById('energy-bar').style.width = Math.min(avgEnergy, 100) + '%';
            document.getElementById('conn-val').innerText = Math.min(avgEnergy, 100).toFixed(1);
            requestAnimationFrame(draw);
        }
        draw();

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    </script>
</body>
</html>
