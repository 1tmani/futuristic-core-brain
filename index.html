<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Core-Brain V4 | Projector Matrix</title>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #7000ff; --deep-bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--deep-bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Projector Lens Flare Layer */
        .projector-beam {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background: radial-gradient(circle at 20% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
            pointer-events: none; z-index: 5; animation: beam-flicker 4s infinite;
        }
        @keyframes beam-flicker { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.4; } }

        /* Chromatic Aberration & Scanlines */
        .screen-fx {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; z-index: 10; pointer-events: none;
        }

        .core-v4 { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; perspective: 1000px; }

        /* Floating Holo-Grid */
        .holo-grid {
            width: 500px; height: 500px; border: 1px solid rgba(0, 242, 255, 0.2);
            position: absolute; transform: rotateX(60deg);
            background-image: linear-gradient(var(--neon-cyan) 1px, transparent 1px),
                              linear-gradient(90deg, var(--neon-cyan) 1px, transparent 1px);
            background-size: 40px 40px; animation: grid-scroll 10s infinite linear;
        }
        @keyframes grid-scroll { from { background-position: 0 0; } to { background-position: 0 400px; } }

        .glitch-v4 {
            font-size: 5rem; font-weight: 900; color: #fff;
            text-shadow: 2px 0 var(--neon-purple), -2px 0 var(--neon-cyan);
            letter-spacing: 20px; z-index: 100; text-align: center;
        }
    </style>
</head>
<body>
    <div class='projector-beam'></div>
    <div class='screen-fx'></div>

    <div class='core-v4'>
        <div class='holo-grid'></div>
        <h1 class='glitch-v4'>CORE PROJECTOR</h1>
    </div>

    <script>
        setInterval(() => {
            document.body.style.opacity = Math.random() > 0.98 ? '0.8' : '1';
        }, 50);
    </script>
</body>
</html>
