<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>SPACE RACING CORE | V36 DEEP DEPTH</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Michroma&display=swap' rel='stylesheet'>
<style>
:root{
     --c1:#00f0ff; --c2:#8a2eff; --c3:#ff2e88;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
     background:#000; color:#fff; font-family:'Michroma',sans-serif; overflow:hidden;
}
canvas{
     position:fixed; inset:0; z-index:0;
}
header{
     position:fixed; top:0; width:100%; z-index:100;
     backdrop-filter:blur(20px); background:rgba(0,0,0,.3);
     border-bottom:1px solid rgba(255,255,255,.1);
}
nav{
     display:flex; justify-content:space-between; padding:20px 40px;
}
.logo{
     font-family:'Orbitron',sans-serif; letter-spacing:10px; font-weight:900; text-shadow:0 0 20px var(--c1);
}
.controls{ display:flex; gap:15px; }
button{
     background:rgba(255,255,255,.05); color:#fff; border:1px solid rgba(255,255,255,.2);
     padding:12px 20px; border-radius:4px; cursor:pointer; font-family:'Orbitron'; font-size:10px; transition:0.3s;
}
button:hover{ background:var(--c1); color:#000; box-shadow:0 0 20px var(--c1); }
.overlay-hud{
     position:relative; z-index:10; pointer-events:none; height:100vh; padding:120px 40px;
}
.stats-box{
     background:rgba(0,0,0,0.6); border-left:4px solid var(--c1); padding:20px; width:fit-content;
     backdrop-filter:blur(10px); font-size:12px; line-height:2; letter-spacing:2px;
}
.horizon-glow{
     position:fixed; bottom:0; width:100%; height:40vh; z-index:1; pointer-events:none;
     background:linear-gradient(to top, var(--c1), transparent); opacity:0.15;
     transition: 1s ease-in-out;
}
</style>
</head>
<body>
<div class='horizon-glow' id='h-glow'></div>
<canvas id='game'></canvas>
<header>
<nav>
<div class='logo'>DEEP RACER</div>
<div class='controls'>
<button onclick='setSpeed(3)'>CRUISE</button>
<button onclick='setSpeed(7)'>WARP</button>
<button onclick='setSpeed(12)'>HYPER</button>
</div>
</nav>
</header>
<section class='overlay-hud'>
    <div class='stats-box'>
        SECTOR: <span id='level'>1</span><br>
        VELOCITY: <span id='speed'>7</span> u/s<br>
        SYNC: STABLE
    </div>
</section>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let w,h, speed=7, level=1, time=0;
let car={ x:0, y:0, w:70, h:110 };
let stars=[];

function resize(){
     w=canvas.width=innerWidth;
     h=canvas.height=innerHeight;
     car.x=w/2; car.y=h-180;
}
resize(); addEventListener('resize',resize);

for(let i=0;i<400;i++){
     stars.push({ x:Math.random()*w, y:Math.random()*h, z:Math.random()*3+1 });
}

function setSpeed(v){ speed=v; document.getElementById('speed').textContent=v; }

addEventListener('keydown',e=>{
     if(e.key==='ArrowLeft') car.x-=45;
     if(e.key==='ArrowRight') car.x+=45;
     if(e.code==='Space'){
          level = (level % 5) + 1;
          document.getElementById('level').textContent=level;
          const colors=['#00f0ff','#8a2eff','#ff2e88','#ffb800','#00ff75'];
          document.documentElement.style.setProperty('--c1', colors[level-1]);
     }
});

function drawUniverse(){
     time += 0.01;
     for(const s of stars){
          s.y += speed * (s.z * 0.5);
          if(s.y > h){ s.y=0; s.x=Math.random()*w; }
          ctx.fillStyle=`rgba(255,255,255,${s.z/4})`;
          ctx.beginPath(); ctx.arc(s.x, s.y, s.z/2, 0, Math.PI*2); ctx.fill();
     }
}

function drawTrack(){
     const horizon = h * 0.4;
     ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--c1')+'44';
     ctx.lineWidth=2;
     
     // Perspective lines
     for(let i=-10; i<=10; i++){
          ctx.beginPath();
          ctx.moveTo(w/2 + (i*20), horizon);
          ctx.lineTo(w/2 + (i*250), h);
          ctx.stroke();
     }

     // Horizontal depth lines
     for(let i=0; i<15; i++){
          let y = horizon + Math.pow(i/15, 2) * (h-horizon);
          let fade = i/15;
          ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--c1') + Math.floor(fade*255).toString(16).padStart(2,'0');
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(w, y);
          ctx.stroke();
     }
}

function drawCar(){
     ctx.save();
     ctx.shadowBlur=40; ctx.shadowColor=getComputedStyle(document.documentElement).getPropertyValue('--c1');
     ctx.fillStyle='#fff';
     ctx.fillRect(car.x-car.w/2, car.y, car.w, car.h);
     
     // Engine Glow
     ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--c1');
     ctx.fillRect(car.x-car.w/2, car.y+car.h-10, car.w, 15);
     ctx.restore();
}

function animate(){
     ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h);
     drawUniverse();
     drawTrack();
     drawCar();
     requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
