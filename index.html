<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V41 | LAYER 2 NEXUS</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&family=Syncopate:wght@400;700&display=swap' rel='stylesheet'>
<style>
:root{
     --c1:#00f0ff; --c2:#8a2eff; --c3:#ff2e88; --c4:#00ff75; --dim: 1; --f-weight: 100; --f-width: 100%;
     --bg: #000; --entry-op: 1;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{ background:var(--bg); color:#fff; font-family:'Michroma',sans-serif; overflow-x:hidden; scroll-behavior:smooth; }

canvas{ position:fixed; inset:0; z-index:1; mix-blend-mode: screen; }

/* ENTRY CINEMATIC LAYER */
.entry-site{ 
    position:relative; z-index:1000; min-height:200vh; background:#050505; 
    opacity: var(--entry-op); transition: opacity 2s cubic-bezier(0.19, 1, 0.22, 1);
    display: flex; flex-direction: column; align-items: center;
}
.entry-hero{ height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
.premium-label{ font-family:'Syncopate'; font-weight:700; letter-spacing:20px; font-size:4rem; text-transform:uppercase; }

/* 8D GAMING HUD */
.game-hud{ 
    position:fixed; top:30px; right:30px; z-index:2000; display:flex; gap:10px; 
    opacity: calc(1 - var(--entry-op)); pointer-events: auto;
}
.hud-btn{ 
    background:rgba(255,255,255,0.05); border:1px solid var(--c1); color:#fff; 
    padding:10px 20px; font-family:'Orbitron'; font-size:10px; cursor:pointer; transition:0.3s;
}
.hud-btn:hover{ background:var(--c1); color:#000; box-shadow:0 0 20px var(--c1); }

/* NIGHTINGALE ELEMENTS */
.nightingale-node{ 
    position:fixed; width:2px; height:2px; background:#fff; border-radius:50%; 
    box-shadow:0 0 10px var(--c3); z-index:5; pointer-events:none;
}

.pixel-fill{ 
    position:fixed; inset:0; z-index:0; 
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px); 
    background-size: 4px 4px; pointer-events:none; 
}

#main-title{ 
    font-family:'Orbitron'; font-weight:var(--f-weight); font-stretch: var(--f-width); 
    font-size:clamp(3rem, 15vw, 10rem); letter-spacing:calc(var(--dim)*15px); 
    text-shadow: 0 0 30px var(--c1);
}
</style>
</head>
<body>
<div class='pixel-fill'></div>
<canvas id='universe-8d'></canvas>

<div class='game-hud'>
    <button class='hud-btn' onclick='gameEngine.play()'>PLAY</button>
    <button class='hud-btn' onclick='gameEngine.pause()'>PAUSE</button>
    <button class='hud-btn' onclick='gameEngine.stop()'>STOP</button>
</div>

<main class='entry-site' id='entry'>
    <section class='entry-hero'>
        <h1 class='premium-label'>UNIVERSAL<br>ARCHITECTURE</h1>
        <p style='margin-top:20px; letter-spacing:10px; opacity:0.5;'>SCROLL TO ENTER VOID</p>
    </section>
    <section style='height:100vh;'></section>
</main>

<div style='position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:10; pointer-events:none;'>
    <h1 id='main-title'>CORE</h1>
</div>

<script>
const canvas = document.getElementById('universe-8d');
const ctx = canvas.getContext('2d');
let w, h, time=0, particles=[], isRunning=true;

function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
resize(); addEventListener('resize',resize);

for(let i=0;i<300;i++){
    particles.push({ x:Math.random()*w, y:Math.random()*h, z:Math.random()*w, r:Math.random()*2+1, color:Math.random()*360 });
}

const gameEngine = {
    play: () => isRunning = true,
    pause: () => isRunning = false,
    stop: () => { isRunning = false; time = 0; }
};

window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const opacity = Math.max(0, 1 - scrollY / 800);
    document.documentElement.style.setProperty('--entry-op', opacity);
    if(opacity <= 0) document.getElementById('entry').style.display = 'none';
});

function draw8D(){
    if(!isRunning) { requestAnimationFrame(draw8D); return; }
    time += 0.01;
    
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0,0,w,h);
    
    const cx = w/2, cy = h/2;
    const dimension = 1 + (Math.sin(time*0.5)+1)*3.5;
    document.documentElement.style.setProperty('--f-weight', Math.floor(100 + (Math.sin(time)+1)*400));
    document.documentElement.style.setProperty('--f-width', Math.floor(50 + (Math.cos(time)+1)*50) + '%');

    particles.forEach(p => {
        p.z -= 5;
        if(p.z <= 0) p.z = w;
        let scale = 400/p.z;
        let x2d = (p.x - cx) * scale + cx;
        let y2d = (p.y - cy) * scale + cy;
        
        ctx.fillStyle = `hsla(${p.color}, 100%, 70%, ${1 - p.z/w})`;
        ctx.beginPath();
        ctx.arc(x2d, y2d, scale * dimension, 0, Math.PI*2);
        ctx.fill();

        // Glowing Neural Lines
        if(scale > 3) {
            ctx.strokeStyle = `hsla(${p.color}, 100%, 50%, 0.1)`;
            ctx.beginPath();
            ctx.moveTo(x2d, y2d);
            ctx.lineTo(cx, cy);
            ctx.stroke();
        }
    });

    requestAnimationFrame(draw8D);
}
draw8D();

// Nightingale Procedural Beats
setInterval(() => {
    if(!isRunning) return;
    const node = document.createElement('div');
    node.className = 'nightingale-node';
    node.style.left = Math.random()*100 + 'vw';
    node.style.top = Math.random()*100 + 'vh';
    document.body.appendChild(node);
    setTimeout(() => node.remove(), 2000);
}, 500);
</script>
</body>
</html>
