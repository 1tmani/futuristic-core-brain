<!DOCTYPE html><html><head><meta charset='UTF-8'><title>CORE V69 | HYPER-PULSE</title><style>:root{--p:#00ff75;} body{background:#000;color:#fff;font-family:Orbitron;overflow:hidden;} canvas{position:fixed;inset:0;z-index:1;filter:brightness(1.2) contrast(1.5);} .hud{position:fixed;top:40px;left:40px;z-index:100;border-left:2px solid var(--p);padding-left:20px;letter-spacing:5px; background:rgba(0,0,0,0.8);}</style></head><body><div class='hud'>SYSTEM: V69_HYPER_PULSE<br>STATUS: RADIAL_BURST_ACTIVE</div><canvas id='c'></canvas><script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();function draw(){t+=0.1;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';ctx.lineWidth=4;for(let i=0;i<10;i++){ctx.beginPath();let r=(t*50+i*50)%(w*0.6);ctx.arc(w/2,h/2,r,0,Math.PI*2);ctx.globalAlpha=1-(r/(w*0.6));ctx.stroke();}requestAnimationFrame(draw);}draw();</script></body></html>
