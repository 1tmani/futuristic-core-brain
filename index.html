<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>DEINCORE V69 | NETWORK POWERED</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
<style>
:root{ --p:#00ff75; --s:#ff0055; --bg:#000; }
body,html{ margin:0; background:#000; color:#fff; font-family:'Michroma'; overflow-x:hidden; }
canvas{ position:fixed; inset:0; z-index:1; opacity:0.6; }
.premium-hud{ position:fixed; top:0; left:0; width:100%; z-index:1000; padding:30px; display:flex; justify-content:space-between; align-items:center; backdrop-filter:blur(20px); border-bottom:1px solid rgba(0,255,117,0.1); }
.telemetry-box{ background:rgba(0,0,0,0.8); border:1px solid var(--p); padding:15px; font-family:'JetBrains Mono'; font-size:9px; letter-spacing:2px; min-width:250px; }
.buy-btn{ background:var(--p); color:#000; border:none; padding:15px 40px; font-family:'Orbitron'; font-weight:900; cursor:pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition:0.4s; }

section{ min-height:100vh; position:relative; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.product-core{ width:350px; height:350px; border:2px solid var(--p); border-radius:50%; display:flex; align-items:center; justify-content:center; animation: pulse 3s infinite alternate; }
@keyframes pulse{ from{box-shadow:0 0 20px var(--p);} to{box-shadow:0 0 100px var(--p);} }
.price-display{ font-family:'Orbitron'; font-size:3rem; margin-top:30px; letter-spacing:10px; color:white; text-shadow:0 0 30px var(--p); }
</style>
</head>
<body>
<canvas id='c'></canvas>
<nav class='premium-hud'>
    <div class='telemetry-box'>
        [NETWORK_STATS] ACTIVE<br>
        VELOCITY: <span id='v-val'>0</span> Q-m/s<br>
        STABILITY: <span id='s-val'>0</span> TH/s
    </div>
    <button class='buy-btn'>PRE-ORDER V69</button>
</nav>
<section>
    <div class='product-core'><h1 style='font-family:Orbitron; letter-spacing:10px;'>V69_CORE</h1></div>
    <div class='price-display' id='price-val'>$8,399</div>
    <p style='margin-top:20px; font-size:10px; opacity:0.5; letter-spacing:5px;'>POWERED BY GLOBAL MINING NETWORK</p>
</section>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let w, h, t=0; function res(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; } res();
setInterval(()=>{
    document.getElementById('v-val').innerText = (5000 + Math.random()*4000).toFixed(0);
    document.getElementById('s-val').innerText = (Math.random()*500).toFixed(2);
}, 2000);
function draw(){
    t+=0.01; ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='var(--p)'; ctx.beginPath();
    for(let i=0; i<5; i++){ let r = 100 + i*30 + Math.sin(t+i)*20; ctx.arc(w/2, h/2, r, 0, Math.PI*2); }
    ctx.stroke(); requestAnimationFrame(draw);
} draw();
</script></body></html>
