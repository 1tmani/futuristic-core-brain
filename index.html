<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>CORE-BRAIN V26 | QUANTUM SYNTHETIC INTERFACE</title>
    <link href='https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300&display=swap' rel='stylesheet'>
    <style>
        :root { 
            --primary: #00f2ff; --secondary: #7000ff; --bg: #030303; 
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(0, 242, 255, 0.2);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Michroma', sans-serif; height: 100dvh; overflow: hidden; }

        #main-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.6; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle at center, transparent 20%, #000 120%); z-index: 2; pointer-events: none; }
        .scanlines { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01)); background-size: 100% 4px, 4px 100%; z-index: 3; pointer-events: none; }

        .header-interface { position: fixed; top: 0; left: 0; width: 100%; height: 90px; padding: 0 50px; display: flex; align-items: center; justify-content: space-between; z-index: 100; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .sys-info { display: flex; flex-direction: column; gap: 5px; }
        .sys-tag { font-family: 'Orbitron'; font-size: 10px; color: var(--primary); letter-spacing: 4px; font-weight: 900; }
        .sys-val { font-family: 'JetBrains Mono'; font-size: 12px; opacity: 0.6; }

        .side-nav { position: fixed; left: 0; top: 90px; height: calc(100vh - 90px); width: 80px; border-right: 1px solid var(--border); z-index: 90; display: flex; flex-direction: column; align-items: center; padding-top: 40px; gap: 40px; background: rgba(0,0,0,0.4); }
        .nav-item { width: 40px; height: 40px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; position: relative; }
        .nav-item:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }
        .nav-item::after { content: attr(data-label); position: absolute; left: 60px; font-size: 8px; opacity: 0; transition: 0.3s; pointer-events: none; white-space: nowrap; letter-spacing: 2px; }
        .nav-item:hover::after { opacity: 1; left: 80px; }

        main { position: relative; margin-left: 80px; margin-top: 90px; height: calc(100vh - 90px); display: flex; align-items: center; justify-content: center; z-index: 10; }
        .core-module { width: 500px; height: 500px; position: relative; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .orbit { position: absolute; border: 1px solid var(--border); border-radius: 50%; animation: rotate linear infinite; }
        .o1 { width: 100%; height: 100%; animation-duration: 20s; border-style: dashed; }
        .o2 { width: 80%; height: 80%; animation-duration: 15s; border-width: 2px; opacity: 0.4; }
        .o3 { width: 60%; height: 60%; animation-duration: 10s; border-color: var(--secondary); opacity: 0.2; }

        .center-node { width: 140px; height: 140px; background: var(--bg); border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 100px rgba(0, 242, 255, 0.3), inset 0 0 30px var(--primary); z-index: 20; position: relative; cursor: pointer; }
        .node-text { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 8px; font-size: 1.2rem; text-shadow: 0 0 10px var(--primary); }

        .diagnostic-panel { position: absolute; bottom: 40px; right: 40px; width: 300px; padding: 25px; background: var(--glass); border: 1px solid var(--border); border-radius: 4px; backdrop-filter: blur(10px); }
        .diag-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 10px; letter-spacing: 2px; }
        .progress-bg { width: 100%; height: 2px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .progress-fill { position: absolute; height: 100%; background: var(--primary); width: 0%; transition: width 0.5s; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <canvas id='main-canvas'></canvas>
    <div class='vignette'></div>
    <div class='scanlines'></div>

    <header class='header-interface'>
        <div class='sys-info'>
            <div class='sys-tag'>NODE_PRIME_V26</div>
            <div class='sys-val'>LATENCY: <span id='ping'>--</span> MS</div>
        </div>
        <div class='sys-tag' style='font-size: 14px;'>NEURAL_LINK_ESTABLISHED</div>
        <div class='sys-info' style='text-align: right;'>
            <div class='sys-tag'>UPLINK_STATUS</div>
            <div class='sys-val' id='time'>00:00:00</div>
        </div>
    </header>

    <nav class='side-nav'>
        <div class='nav-item' data-label='CORE_SYSTEM'>●</div>
        <div class='nav-item' data-label='DATA_STREAM'>◈</div>
        <div class='nav-item' data-label='SECURITY_GRID'>▣</div>
        <div class='nav-item' data-label='EVOLUTION_LOG'>⚙</div>
    </nav>

    <main>
        <div class='core-module'>
            <div class='orbit o1'></div>
            <div class='orbit o2'></div>
            <div class='orbit o3'></div>
            <div class='center-node' id='trigger'>
                <span class='node-text'>V26</span>
            </div>
        </div>

        <section class='diagnostic-panel'>
            <div class='diag-row'><span>NEURAL_LOAD</span><span id='load-val'>0%</span></div>
            <div class='progress-bg'><div class='progress-fill' id='load-bar'></div></div>
            <div style='margin-top:20px;' class='diag-row'><span>MEMORY_SYNC</span><span id='sync-val'>0%</span></div>
            <div class='progress-bg'><div class='progress-fill' id='sync-bar'></div></div>
        </section>
    </main>

    <script>
        setInterval(() => {
            const d = new Date();
            document.getElementById('time').innerText = d.toTimeString().split(' ')[0];
            document.getElementById('ping').innerText = Math.floor(Math.random() * 20 + 5);
        }, 1000);

        function updateStats() {
            const load = Math.floor(Math.random() * 100);
            const sync = Math.floor(Math.random() * 100);
            document.getElementById('load-val').innerText = load + '%';
            document.getElementById('sync-val').innerText = sync + '%';
            document.getElementById('load-bar').style.width = load + '%';
            document.getElementById('sync-bar').style.width = sync + '%';
        }
        setInterval(updateStats, 3000); updateStats();

        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, dots = [];

        const init = () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            dots = Array.from({length: 100}, () => ({
                x: Math.random() * w, y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5
            }));
        };
        window.onresize = init; init();

        const render = () => {
            ctx.clearRect(0, 0, w, h);
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.1)';
            ctx.lineWidth = 0.5;
            dots.forEach((d, i) => {
                d.x += d.vx; d.y += d.vy;
                if(d.x<0||d.x>w) d.vx*=-1; if(d.y<0||d.y>h) d.vy*=-1;
                ctx.beginPath();
                ctx.arc(d.x, d.y, 1, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(0, 242, 255, 0.3)';
                ctx.fill();
                for(let j=i+1; j<dots.length; j++) {
                    const d2 = dots[j];
                    const dist = Math.hypot(d.x - d2.x, d.y - d2.y);
                    if(dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(d.x, d.y);
                        ctx.lineTo(d2.x, d2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(render);
        };
        render();
    </script>
</body>
</html>
