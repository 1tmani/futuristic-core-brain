<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>DEINCORE V69 | NEURAL HARDWARE</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&display=swap' rel='stylesheet'>
<style>
:root{ --p:#00f0ff; --s:#ff0055; --bg:#000; }
body,html{ margin:0; background:#000; color:#fff; font-family:'Michroma'; overflow-x:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.sales-hud{ position:fixed; top:0; left:0; width:100%; z-index:1000; padding:30px; display:flex; justify-content:space-between; align-items:center; backdrop-filter:blur(20px); border-bottom:1px solid var(--p); }
.logo{ font-family:'Orbitron'; font-weight:900; letter-spacing:5px; color:var(--p); text-shadow: 0 0 10px var(--p); }
.buy-btn{ background:var(--p); color:#000; border:none; padding:15px 40px; font-family:'Orbitron'; font-weight:900; cursor:pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition:0.3s; }
.buy-btn:hover{ box-shadow:0 0 40px var(--p); transform:scale(1.1); }

section{ min-height:100vh; position:relative; z-index:100; display:flex; align-items:center; justify-content:center; padding:50px; }
.hero-box{ text-align:center; background:rgba(0,0,0,0.7); padding:50px; border:1px solid rgba(0,240,255,0.2); border-radius:10px; backdrop-filter:blur(10px); }
.product-title{ font-family:'Orbitron'; font-size:clamp(3rem, 10vw, 7rem); letter-spacing:20px; margin:0; text-transform:uppercase; text-shadow:0 0 50px var(--p); }
.price-tag{ font-size:24px; color:var(--s); font-family:'Orbitron'; margin-top:20px; letter-spacing:5px; }
</style>
</head>
<body>
<canvas id='c'></canvas>
<nav class='sales-hud'>
    <div class='logo'>DEINCORE V69</div>
    <button class='buy-btn'>PRE-ORDER NOW</button>
</nav>
<section>
    <div class='hero-box'>
        <h1 class='product-title'>DEINCORE</h1>
        <div class='price-tag'>UNIT_V69 // $4,999</div>
        <p style='margin-top:30px; opacity:0.7; letter-spacing:2px;'>NEURAL_CORE_V69: THE FIRST AUTONOMOUS HARDWARE ORGANISM.</p>
    </div>
</section>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let w, h, t=0; function res(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; } res();
window.onresize=res;
function draw(){
    t+=0.02; ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='var(--p)'; ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0; i<8; i++){
        let r = 150 + Math.sin(t+i)*50;
        ctx.arc(w/2, h/2, r, 0, Math.PI*2);
    }
    ctx.stroke();
    requestAnimationFrame(draw);
} draw();
</script></body></html>
