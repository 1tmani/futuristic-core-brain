<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>SPACE RACING CORE</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Michroma&display=swap' rel='stylesheet'>
<style>
:root{
     --c1:#00f0ff;
      --c2:#8a2eff;
       --c3:#ff2e88;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
     background:#000;
      color:#fff;
       font-family:'Michroma',sans-serif;
        overflow-x:hidden;
}
body{
     background:
      radial-gradient(circle at 20% 20%,rgba(0,240,255,.10),transparent 25%),
       radial-gradient(circle at 80% 30%,rgba(138,46,255,.10),transparent 30%),
        radial-gradient(circle at 50% 80%,rgba(255,46,136,.10),transparent 35%),
         linear-gradient(135deg,#010203,#040814,#000);
          background-size:220% 220%;
           animation:bgFlow 14s infinite alternate ease-in-out;
}
canvas{
     position:fixed;
      inset:0;
       z-index:0;
}
header{
     position:fixed;
      top:0;
       width:100%;
        z-index:100;
         backdrop-filter:blur(18px);
          background:rgba(0,0,0,.18);
           border-bottom:1px solid rgba(255,255,255,.08);
}
av{
     display:flex;
      justify-content:space-between;
       padding:18px 28px;
}
.logo{
     font-family:'Orbitron',sans-serif;
      letter-spacing:8px;
       text-shadow:0 0 18px var(--c1);
}
.controls{
     display:flex;
      gap:12px;
}
button{
     background:rgba(255,255,255,.05);
      color:#fff;
       border:1px solid rgba(255,255,255,.12);
        padding:10px 16px;
         border-radius:12px;
          cursor:pointer;
}
.hero{
     position:relative;
      z-index:5;
       min-height:100vh;
        display:flex;
         align-items:center;
          justify-content:center;
}
.panel{
     width:min(1200px,92%);
      display:grid;
       grid-template-columns:1fr 1fr;
        gap:28px;
}
.box{
     background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
       border-radius:24px;
        backdrop-filter:blur(18px);
         padding:28px;
}
.title{
     font-family:'Orbitron',sans-serif;
      font-size:clamp(2.4rem,6vw,5rem);
       line-height:1.05;
        letter-spacing:8px;
}
.subtitle{
     margin-top:18px;
      line-height:1.9;
       opacity:.84;
        font-size:.84rem;
}
.stats{
     margin-top:20px;
      line-height:2;
       font-size:.8rem;
}
@keyframes bgFlow{
     from{background-position:0% 50%}
      to{background-position:100% 50%}
}
@media(max-width:900px){
     .panel{grid-template-columns:1fr}
}
</style>
</head>
<body>
<canvas id='game'></canvas>
<header>
<nav>
<div class='logo'>SPACE RACER</div>
<div class='controls'>
<button onclick='setSpeed(2)'>LOW</button>
<button onclick='setSpeed(5)'>NEUTRAL</button>
<button onclick='setSpeed(9)'>HIGH</button>
</div>
</nav>
</header>
<section class='hero'>
<div class='panel'>
<div class='box'>
<div class='title'>SPACE<br>RACING</div>
<div class='subtitle'>
Universal racing engine with flowing cosmic road systems, adaptive speed levels, neon car lighting and futuristic space themes.
</div>
<div class='stats'>
LEVEL: <span id='level'>1</span><br>
SPEED: <span id='speed'>5</span><br>
MODE: COSMIC TRACK
</div>
</div>
<div class='box'>
<div class='subtitle'>
Controls:<br><br>
← Move Left<br>
→ Move Right<br>
Space = Level Shift
</div>
</div>
</div>
</section>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let w,h;
let speed=5;
let level=1;
let car={
     x:0,
      y:0,
       w:60,
        h:100
};
let stars=[];
function resize(){
     w=canvas.width=innerWidth;
      h=canvas.height=innerHeight;
       car.x=w/2;
        car.y=h-160;
}
resize();
addEventListener('resize',resize);
for(let i=0;i<500;i++){
     stars.push({
          x:Math.random()*w,
            y:Math.random()*h,
              z:Math.random()*2+1
     });
}
function setSpeed(v){
     speed=v;
      document.getElementById('speed').textContent=v;
}
addEventListener('keydown',e=>{
     if(e.key==='ArrowLeft') car.x-=35;
      if(e.key==='ArrowRight') car.x+=35;
       if(e.code==='Space'){
          level++;
            if(level>5) level=1;
              document.getElementById('level').textContent=level;
       }
});
function drawStars(){
     for(const s of stars){
          s.y+=speed*s.z;
            if(s.y>h){
                   s.y=0;
                      s.x=Math.random()*w;
            }
              ctx.beginPath();
                ctx.arc(s.x,s.y,s.z,0,Math.PI*2);
                  ctx.fillStyle=`rgba(255,255,255,0.8)`;
                    ctx.fill();
     }
}
function drawTrack(){
     ctx.strokeStyle='rgba(0,240,255,0.22)';
      ctx.lineWidth=3;
       for(let i=0;i<14;i++){
          ctx.beginPath();
            ctx.moveTo(w/2-(i*40),h);
              ctx.lineTo(w/2-(i*120),0);
                ctx.stroke();
                  ctx.beginPath();
                    ctx.moveTo(w/2+(i*40),h);
                      ctx.lineTo(w/2+(i*120),0);
                        ctx.stroke();
       }
}
function drawCar(){
     ctx.fillStyle=`rgba(${80+level*30},240,255,0.9)`;
      ctx.fillRect(car.x-car.w/2,car.y,car.w,car.h);
       ctx.shadowBlur=30;
        ctx.shadowColor='cyan';
         ctx.fillStyle='rgba(255,255,255,.8)';
          ctx.fillRect(car.x-20,car.y+10,12,12);
           ctx.fillRect(car.x+8,car.y+10,12,12);
            ctx.shadowBlur=0;
}
function drawLevelGlow(){
     const colors=[
          'rgba(0,240,255,.08)',
            'rgba(138,46,255,.08)',
              'rgba(255,46,136,.08)',
                'rgba(255,180,0,.08)',
                  'rgba(0,255,120,.08)'
     ];
      ctx.fillStyle=colors[level-1];
       ctx.fillRect(0,0,w,h);
}
function animate(){
     ctx.clearRect(0,0,w,h);
      drawLevelGlow();
       drawStars();
        drawTrack();
         drawCar();
          requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
