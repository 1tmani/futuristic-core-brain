<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE-BRAIN V26 | CINEMATIC NEURAL FIELD</title>
<link href='https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@700&display=swap' rel='stylesheet'>
<style>
:root{ --cyan:#00f2ff; --bg:#000; }
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ width:100%; height:100%; overflow:hidden; background:radial-gradient(circle at center,#02060a 0%,#000 70%); font-family:'Michroma',sans-serif; color:white; }
canvas{ position:fixed; inset:0; z-index:0; }
.overlay{ position:fixed; inset:0; background:radial-gradient(circle at center, rgba(0,242,255,0.05), transparent 50%); z-index:1; pointer-events:none; }
.hud{ position:fixed; top:30px; left:30px; z-index:20; border-left:2px solid var(--cyan); padding-left:15px; font-size:10px; line-height:1.9; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.85); }
.main{ position:relative; z-index:10; width:100%; height:100vh; display:flex; align-items:center; justify-content:center; }
.title{ font-family:'Orbitron',sans-serif; font-size:5rem; letter-spacing:24px; color:white; text-shadow: 0 0 12px rgba(0,242,255,0.5), 0 0 30px rgba(0,242,255,0.25); animation:pulse 4s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{ opacity:0.82; transform:scale(1); } 50%{ opacity:1; transform:scale(1.03); } }
@media(max-width:768px){ .title{ font-size:2.5rem; letter-spacing:10px; } .hud{ font-size:8px; top:20px; left:20px; } }
</style>
</head>
<body>
<div class='overlay'></div>
<div class='hud'>● CORE STATUS: V26 ACTIVE<br>● NEURAL STRESS: <span id='stress'>0.0</span><br>● FIELD MODE: CINEMATIC</div>
<canvas id='scene'></canvas>
<main class='main'><h1 class='title'>CORE</h1></main>
<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
let w, h, mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2, v: 0 };
const rows = 55, cols = 55;
function resize(){ w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();
window.addEventListener('mousemove', (e)=>{ mouse.v = Math.abs(e.clientX - mouse.x) + Math.abs(e.clientY - mouse.y); mouse.x = e.clientX; mouse.y = e.clientY; });
function drawGrid(time){ ctx.fillStyle = 'rgba(0,0,0,0.16)'; ctx.fillRect(0,0,w,h);
const cellW = w / cols; const cellH = h / rows; const stress = Math.min(mouse.v / 40, 8);
document.getElementById('stress').textContent = stress.toFixed(1);
for(let y=0; y<rows; y++){ ctx.beginPath();
for(let x=0; x<cols; x++){ const px = x * cellW; const dx = mouse.x - px; const dy = mouse.y - (y * cellH); const dist = Math.sqrt(dx*dx + dy*dy);
const wave = Math.sin(time*0.001 + (x*y)*0.08) * 6; const influence = Math.max(0,120-dist)/10; const py = y * cellH + wave + (influence * stress);
if(x===0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }
ctx.strokeStyle = `rgba(0,242,255,${0.12 + (y/rows)*0.25})`; ctx.lineWidth = 1; ctx.stroke(); } mouse.v *= 0.92; }
function drawParticles(time){ for(let i=0; i<80; i++){ const x = (Math.sin(i*12.4 + time*0.0003)*0.5 + 0.5) * w; const y = (Math.cos(i*8.7 + time*0.0004)*0.5 + 0.5) * h;
const r = Math.sin(time*0.002 + i)*1.5 + 1.8; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle = 'rgba(0,242,255,0.08)'; ctx.fill(); } }
function animate(time){ drawGrid(time); drawParticles(time); requestAnimationFrame(animate); } animate();
</script>
</body>
</html>
