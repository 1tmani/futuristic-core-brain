<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>CORE-BRAIN V27 | NEURAL TOPOGRAPHY</title>
    <link href='https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300&display=swap' rel='stylesheet'>
    <style>
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --bg: #010101;
            --border: rgba(0, 242, 255, 0.2);
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Michroma', sans-serif; height: 100dvh; overflow: hidden; }

        #topography-canvas { position: fixed; inset: 0; z-index: 1; opacity: 0.4; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle at center, transparent 30%, #000 120%); z-index: 2; pointer-events: none; }

        .header-interface { position: fixed; top: 0; left: 0; width: 100%; height: 80px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; z-index: 100; border-bottom: 1px solid var(--border); backdrop-filter: blur(15px); }
        .sys-tag { font-family: 'Orbitron'; font-size: 10px; color: var(--primary); letter-spacing: 4px; font-weight: 900; }

        main { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 10; flex-direction: column; }
        .title { font-family: 'Orbitron'; font-size: 5rem; letter-spacing: 30px; text-shadow: 0 0 30px var(--primary); opacity: 0.9; margin: 0; }

        .diagnostic-overlay { position: fixed; bottom: 30px; left: 30px; border-left: 2px solid var(--primary); padding-left: 15px; font-family: 'JetBrains Mono'; font-size: 10px; z-index: 100; text-transform: uppercase; }
    </style>
</head>
<body>
    <canvas id='topography-canvas'></canvas>
    <div class='vignette'></div>

    <header class='header-interface'>
        <div class='sys-tag'>V27_TOPOGRAPHY_ENGINE</div>
        <div class='sys-tag'>STRESS_MAPPING: ACTIVE</div>
    </header>

    <div class='diagnostic-overlay'>
        TOPOGRAPHY_STRESS: <span id='stress-val'>0.0</span><br>
        MAPPING_COORDINATES: <span id='coords'>0, 0</span>
    </div>

    <main>
        <h1 class='title'>CORE</h1>
    </main>

    <script>
        const canvas = document.getElementById('topography-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, mouse = { x: 0, y: 0, v: 0 };

        const init = () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        };
        window.onresize = init; init();

        window.addEventListener('mousemove', (e) => {
            mouse.v = Math.abs(e.clientX - (mouse.x || e.clientX)) + Math.abs(e.clientY - (mouse.y || e.clientY));
            mouse.x = e.clientX; mouse.y = e.clientY;
            document.getElementById('coords').innerText = `${mouse.x}, ${mouse.y}`;
        });

        const draw = () => {
            ctx.fillStyle = '#010101'; ctx.fillRect(0,0,w,h);
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.2)';
            ctx.lineWidth = 1;

            const stress = Math.min(mouse.v / 40, 6);
            document.getElementById('stress-val').innerText = stress.toFixed(2);

            const spacing = 40;
            const rows = h / spacing; const cols = w / spacing;

            for(let i = 0; i < rows; i++) {
                ctx.beginPath();
                for(let j = 0; j < cols; j++) {
                    const x = j * spacing;
                    const y = i * spacing;
                    const dist = Math.hypot(x - mouse.x, y - mouse.y);
                    const influence = Math.max(0, 1 - dist / 300);
                    const offset = Math.sin(dist * 0.01 - Date.now() * 0.003) * (10 + stress * 20 * influence);
                    
                    if(j === 0) ctx.moveTo(x, y + offset); else ctx.lineTo(x, y + offset);
                }
                ctx.stroke();
            }
            mouse.v *= 0.95;
            requestAnimationFrame(draw);
        };
        draw();
    </script>
</body>
</html>
