<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V45 | NIGHTINGALE HARMONICS</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
<style>
:root{
     --c1:#00f0ff; --c2:#8a2eff; --c3:#ff2e88; --dim: 1; --f-weight: 100; --bg: #000; --entry-op: 1;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{ background:#000; color:#fff; font-family:'Michroma',sans-serif; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }

/* PREMIUM HUD */
.interface-hud{ position:fixed; inset:0; z-index:100; pointer-events:none; padding:40px; display:flex; flex-direction:column; justify-content:space-between; }
.hud-top{ display:flex; justify-content:space-between; }
.stat-box{ background:rgba(0,0,0,0.8); border-left:2px solid var(--c1); padding:10px 20px; font-family:'Orbitron'; font-size:10px; letter-spacing:2px; backdrop-filter:blur(10px); }

.nightingale-node{ position:fixed; width:3px; height:3px; background:#fff; border-radius:50%; box-shadow:0 0 15px var(--c3); z-index:5; pointer-events:none; }

.action-panel{ position:fixed; bottom:40px; left:50%; transform:translateX(-50%); z-index:200; display:flex; gap:20px; pointer-events:all; }
.ctrl-btn{ background:transparent; border:1px solid var(--c1); color:#fff; padding:12px 30px; font-family:'Orbitron'; cursor:pointer; transition:0.2s; letter-spacing:3px; font-size:10px; }
.ctrl-btn:hover{ background:var(--c1); color:#000; box-shadow:0 0 30px var(--c1); }
</style>
</head>
<body>
<canvas id='render-canvas'></canvas>
<div class='interface-hud'>
    <div class='hud-top'>
        <div class='stat-box'>FPS: <span id='fps-val'>120</span></div>
        <div class='stat-box'>AUDIO: <span id='audio-status'>STANDBY</span></div>
    </div>
</div>
<div class='action-panel'>
    <button class='ctrl-btn' onclick='initSystem()'>INITIALIZE CORE</button>
    <button class='ctrl-btn' onclick='triggerHarmonic()'>HARMONIC BURST</button>
</div>
<script>
const canvas = document.getElementById('render-canvas');
const ctx = canvas.getContext('2d');
let w, h, time=0, particles=[], isRunning=false, audioCtx, masterGain;

function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
resize(); addEventListener('resize',resize);

for(let i=0; i<300; i++) particles.push({ x:Math.random()*w, y:Math.random()*h, z:Math.random()*w, color:Math.random()*360 });

function initAudio(){
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    masterGain.connect(audioCtx.destination);
    document.getElementById('audio-status').textContent = 'ACTIVE';
}

function playClick(){
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
    osc.connect(g); g.connect(masterGain);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function initSystem(){
    initAudio(); playClick(); isRunning = true;
}

function triggerHarmonic(){
    playClick();
    for(let i=0; i<5; i++){
        const node = document.createElement('div');
        node.className = 'nightingale-node';
        node.style.left = Math.random()*100 + 'vw';
        node.style.top = Math.random()*100 + 'vh';
        document.body.appendChild(node);
        setTimeout(() => node.remove(), 1000);
    }
}

function draw(){
    time += 0.01; 
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0,0,w,h);
    const cx = w/2, cy = h/2;

    particles.forEach(p => {
        p.z -= 5; if(p.z <= 0) p.z = w;
        let sc = 400/p.z;
        let x2d = (p.x - cx) * sc + cx;
        let y2d = (p.y - cy) * sc + cy;
        ctx.fillStyle = `hsla(${p.color + time*20}, 80%, 70%, ${1 - p.z/w})`;
        ctx.fillRect(x2d, y2d, sc*2, sc*2);
    });
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
