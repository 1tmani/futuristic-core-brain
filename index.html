<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>CORE BRAIN | PHASE 10</title>
    <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&display=swap' rel='stylesheet'>
    <style>
        :root { --c1: #00f0ff; --bg: #02040a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Michroma', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        canvas#universe { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        header { position: fixed; top: 0; width: 100%; z-index: 50; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 20px; }
        section { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
        .hero-title { font-family: 'Orbitron'; font-size: 4rem; text-align: center; text-shadow: 0 0 20px var(--c1); }
    </style>
</head>
<body>
    <canvas id='universe'></canvas>
    <header><div style='letter-spacing:5px'>CORE-BRAIN</div></header>
    <section><div><h1 class='hero-title'>PHASE 10<br>DIGITAL ORGANISM</h1></div></section>
    <section><h1>NEURAL INTELLIGENCE</h1></section>
    <section><h1>PARTICLE FIELD</h1></section>
    <section><h1>CRYSTAL ENERGY</h1></section>
    <section><h1>ADAPTIVE AI</h1></section>
    <section><h1>MOTION ENGINE</h1></section>
    <section><h1>AUTOMATED SYSTEMS</h1></section>
    <section><h1>VISUAL LEARNING</h1></section>
    <section><h1>IMAGE EVOLUTION</h1></section>
    <section><h1>FUTURE DEPLOY</h1></section>
    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        let w, h, time = 0;
        const init = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        window.onresize = init; init();
        const render = () => {
            time += 0.01; ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--c1');
            ctx.beginPath();
            for(let i=0; i<10; i++) {
                let x = (w/10)*i; let off = Math.sin(time+i)*50;
                ctx.moveTo(x, 0); ctx.quadraticCurveTo(w/2+off, h/2, x, h);
            }
            ctx.stroke(); requestAnimationFrame(render);
        };
        render();
        setInterval(() => { document.documentElement.style.setProperty('--c1', `hsl(${Math.random()*360}, 100%, 50%)`); }, 4000);
    </script>
<script src='audio_engine.js'></script></body>
</html>
