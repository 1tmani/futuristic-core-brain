<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V49 | 16D QUANTUM VOYAGER</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&display=swap' rel='stylesheet'>
<style>
:root{ --c1:#00f0ff; --c2:#ff2e88; --bg: #000; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; cursor:none; }
.hud-16d{ position:fixed; top:40px; left:40px; z-index:100; border-left:2px solid var(--c1); padding-left:20px; pointer-events:none; text-transform:uppercase; }
.crosshair{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; border:1px solid var(--c1); border-radius:50%; z-index:200; pointer-events:none; opacity:0.5; }
.crosshair::after{ content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:4px; height:4px; background:var(--c2); border-radius:50%; }
#dim-status{ font-family:'Orbitron'; color:var(--c1); font-size:14px; letter-spacing:5px; }
</style>
</head>
<body>
<canvas id='space-canvas'></canvas>
<div class='crosshair'></div>
<div class='hud-16d'>
    <div style='font-size:10px; letter-spacing:3px;'>SYSTEM: QUANTUM_VOYAGER_V49</div>
    <div id='dim-status'>DIMENSION: 16D_ACTIVE</div>
    <div style='font-size:10px; letter-spacing:3px; opacity:0.6;'>VELOCITY: <span id='speed'>0</span> LY/S</div>
</div>
<script>
const canvas=document.getElementById('space-canvas'), ctx=canvas.getContext('2d');
let w, h, time=0, particles=[], mouse={x:innerWidth/2, y:innerHeight/2}, speed=0;

function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
resize(); addEventListener('resize',resize);

for(let i=0; i<600; i++) {
    particles.push({ 
        x: Math.random()*w - w/2, 
        y: Math.random()*h - h/2, 
        z: Math.random()*w, 
        color: Math.random()*360 
    });
}

window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    speed = (Math.abs(e.clientX - w/2) + Math.abs(e.clientY - h/2)) / 50;
});

function draw(){
    time+=0.01; 
    ctx.fillStyle='rgba(0,0,0,0.2)'; 
    ctx.fillRect(0,0,w,h);
    
    const cx = w/2, cy = h/2;
    
    // 16D Dimensional Layers (Recursive Circles)
    for(let i=0; i<16; i++) {
        ctx.strokeStyle = `hsla(${time*50 + i*20}, 100%, 50%, ${0.05 - i*0.003})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        const r = 100 + (i * 40) + Math.sin(time + i)*20;
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.stroke();
    }

    particles.forEach(p => {
        p.z -= 2 + speed;
        if(p.z <= 0) p.z = w;

        let sc = 400/p.z;
        let x2d = (p.x * sc) + cx + (mouse.x - cx) * (p.z/w);
        let y2d = (p.y * sc) + cy + (mouse.y - cy) * (p.z/w);

        ctx.fillStyle = `hsla(${p.color}, 80%, 70%, ${1 - p.z/w})`;
        ctx.fillRect(x2d, y2d, sc, sc);

        if(sc > 2) {
            ctx.strokeStyle = `hsla(${p.color}, 80%, 70%, ${0.1 * (1 - p.z/w)})`;
            ctx.beginPath();
            ctx.moveTo(x2d, y2d);
            ctx.lineTo(cx, cy);
            ctx.stroke();
        }
    });

    document.getElementById('speed').innerText = (speed * 100).toFixed(0);
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
