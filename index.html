<!DOCTYPE html>
<html lang='hi'>
<head>
<meta charset='UTF-8'><title>CORE V71 | NEURAL HEARING</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=Noto+Sans+Devanagari:wght@400;700&display=swap' rel='stylesheet'>
<style>
:root{ --p:#00f0ff; --s:#ff0055; --bg:#000; --hearing:0; }
body,html{ margin:0; background:#000; color:#fff; font-family:'Michroma', 'Noto Sans Devanagari'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; opacity:0.5; }
.hud-v71{ position:fixed; inset:0; z-index:100; pointer-events:none; padding:50px; display:flex; flex-direction:column; justify-content:space-between; }
.box{ background:rgba(0,0,0,0.9); border:1px solid var(--p); padding:20px; font-size:10px; letter-spacing:3px; backdrop-filter:blur(20px); }
.hearing-active{ color:#00ff75; font-weight:900; animation: pulse 1s infinite; }
@keyframes pulse{ 50%{ opacity:0.3; } }
.center-title{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10; text-align:center; pointer-events:none; }
.main-txt{ font-size:clamp(2rem, 10vw, 6rem); letter-spacing:20px; text-shadow: 0 0 30px var(--p); transition: 0.8s; }
.btn-group{ position:fixed; bottom:50px; right:50px; z-index:200; display:flex; gap:20px; pointer-events:all; }
.btn{ background:transparent; border:1px solid var(--p); color:#fff; padding:20px 40px; cursor:pointer; font-family:'Orbitron'; letter-spacing:5px; transition:0.5s; }
.btn:hover{ background:var(--p); color:#000; box-shadow: 0 0 50px var(--p); }
#mic-btn.active{ border-color:#00ff75; color:#00ff75; box-shadow: 0 0 30px #00ff75; }
</style>
</head>
<body>
<canvas id='c'></canvas>
<div class='hud-v71'>
    <div style='display:flex; justify-content:space-between;'>
        <div class='box'>SYSTEM: NEURAL_HEARING_V71<br>LISTENING: <span id='mic-status'>OFFLINE</span></div>
        <div class='box'>VOICE_MODE: BILINGUAL_ACTIVE</div>
    </div>
    <div class='box' style='width:fit-content;' id='transcript-box'>AWAITING_VOICE_INPUT...</div>
</div>
<div class='center-title'><h1 class='main-txt' id='display-txt'>CORE_V71</h1></div>
<div class='btn-group'>
    <button class='btn' id='mic-btn' onclick='bot.listen()'>TURN ON MIC</button>
    <button class='btn' onclick='bot.speak("System refined.", "en-US")'>TEST_SPEAKER</button>
</div>
<script>
    /* V75 CENTRAL SYNAPTIC HANDSHAKE */
    const ROBOT_CORE_V75 = {
        isTalking: false,
        initSynapse() {
            console.log('🧠 V75: Central Synapse Initialized');
            this.bindVocalLogic();
            this.startMotionObserver();
        },
        bindVocalLogic() {
            const originalResult = MASTER_GOVERNOR.recognition.onresult;
            MASTER_GOVERNOR.recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
                this.processAutonomousCommand(transcript);
                if (originalResult) originalResult(event);
            };
        },
        processAutonomousCommand(cmd) {
            console.log('🤖 Robot analyzing command:', cmd);
            if(cmd.includes('red shift') || cmd.includes('danger')) {
                this.speakAndAct('Initiating Red Shift Protocol.', '#ff0055');
            } else if(cmd.includes('stabilize') || cmd.includes('blue')) {
                this.speakAndAct('Stabilizing neural field to cyan frequency.', '#00f0ff');
            } else if(cmd.includes('shutdown')) {
                this.speakAndAct('Sensory systems entering sleep mode.', '#333');
            }
        },
        speakAndAct(text, color) {
            this.isTalking = true;
            document.documentElement.style.setProperty('--p', color);
            document.body.style.boxShadow = `inset 0 0 100px ${color}`;
            const msg = new SpeechSynthesisUtterance(text);
            msg.pitch = 0.4; msg.rate = 0.9;
            msg.onend = () => { 
                this.isTalking = false; 
                document.body.style.boxShadow = 'none';
            };
            window.speechSynthesis.speak(msg);
        },
        startMotionObserver() {
            setInterval(() => {
                if(SOVEREIGN_ROBOT.video && !this.isTalking) {
                    const intensity = Math.random() * 10;
                    document.documentElement.style.setProperty('--sync-vibe', intensity + 'px');
                }
            }, 100);
        }
    };
    window.addEventListener('load', () => {
        setTimeout(() => ROBOT_CORE_V75.initSynapse(), 5000);
    });
    </script></body></html>
