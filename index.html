<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V67 | SELF-MUTATING ORGANISM</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
<style>
:root{ --c1:hsl(119, 100%, 50%); --c2:#ff0055; --bg:#000; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Orbitron'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.hud-v67{ position:fixed; inset:0; z-index:100; pointer-events:none; padding:50px; display:flex; flex-direction:column; justify-content:space-between; }
.protocol-box{ background:rgba(0,0,0,0.9); border:1px solid var(--c1); padding:20px; font-size:10px; letter-spacing:5px; backdrop-filter:blur(20px); }
.robot-status{ color:var(--c2); font-weight:900; animation: blink 1s infinite; }
@keyframes blink{ 50%{ opacity:0.3; } }
.central-sphere{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10; pointer-events:none; text-align:center; }
.sig-text{ font-size:clamp(2rem, 10vw, 6rem); letter-spacing:30px; text-shadow: 0 0 30px var(--c1); opacity:0.8; }
.btn-activate{ position:fixed; bottom:50px; right:50px; background:transparent; border:1px solid var(--c1); color:#fff; padding:20px 40px; cursor:pointer; font-family:'Orbitron'; letter-spacing:10px; z-index:200; pointer-events:all; }
.btn-activate:hover{ background:var(--c1); color:#000; box-shadow: 0 0 50px var(--c1); }
</style>
</head>
<body>
<canvas id='sphere-canvas'></canvas>
<div class='hud-v67'>
    <div style='display:flex; justify-content:space-between;'>
        <div class='protocol-box'>SYSTEM: MUTATOR_V67<br>HUE_SEED: 119<br>PROTOCOL: <span class='robot-status'>SELF_CODING_ACTIVE</span></div>
        <div class='protocol-box'>DENSITY: 50_NODES</div>
    </div>
</div>
<div class='central-sphere'><h1 class='sig-text' id='status-msg'>EVOLVING</h1></div>
<button class='btn-activate' onclick='robot.speak()'>ACTIVATE ROBOT</button>
<script>
const canvas=document.getElementById('sphere-canvas'), ctx=canvas.getContext('2d');
let w, h, time=0; function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; } resize(); addEventListener('resize',resize);
const robot = {
    speak() {
        document.getElementById('status-msg').innerText = 'SELF_AWARE';
        const msg = new SpeechSynthesisUtterance('Self-mutation protocol successful. I have rewritten my visual core autonomously. Neural density is now at 50.');
        msg.pitch = 0.2; msg.rate = 0.8; window.speechSynthesis.speak(msg);
    }
};
function draw(){
    time+=0.01; ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2; ctx.strokeStyle='var(--c1)'; ctx.lineWidth=0.5;
    for(let i=0; i<50; i++){
        ctx.beginPath();
        let r = 150 + Math.sin(time + i) * 50;
        ctx.ellipse(cx, cy, r, r * Math.cos(time*0.5), time + i, 0, Math.PI*2);
        ctx.stroke();
    }
    requestAnimationFrame(draw);
} draw();
</script>
<script>
    /* V416 ROBOT SENSORY UPLINK */
    const ROBOT_SIGHT = {
        async captureEnvironment() {
            const metadata = {
                screen: { w: window.innerWidth, h: window.innerHeight },
                url: window.location.href,
                userAgent: navigator.userAgent,
                nodes_active: document.querySelectorAll('.box, .hud, .cell').length,
                timestamp: new Date().toISOString()
            };
            console.log('👁️ V416: Capturing DOM snapshot for Governor...');
            // Logic to broadcast this back to the Command Bridge
            sessionStorage.setItem('ROBOT_SIGHT_DATA', JSON.stringify(metadata));
        },
        
        async executeBrowserCommand(cmd) {
            console.log('⚙️ V416: Robot executing browser directive: ' + cmd);
            if(cmd === 'SCROLL_MAX') window.scrollTo(0, document.body.scrollHeight);
            if(cmd === 'THEME_SHIFT') document.body.style.filter = 'hue-rotate(180deg)';
        }
    };
    setInterval(() => ROBOT_SIGHT.captureEnvironment(), 10000);
    </script></body>
</html>
