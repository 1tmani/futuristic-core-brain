<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V40 | NIGHTINGALE DEFENSE</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&family=Syncopate:wght@400;700&display=swap' rel='stylesheet'>
<style>
:root{
     --c1:#00f0ff; --c2:#8a2eff; --c3:#ff2e88; --c4:#00ff75; --dim: 1; --f-weight: 100; --f-width: 100%;
     --bg: #000; --ui-op: 1;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{ background:var(--bg); color:#fff; font-family:'Michroma',sans-serif; overflow:hidden; }

canvas{ position:fixed; inset:0; z-index:1; mix-blend-mode: screen; }

.pixel-fill{ position:fixed; inset:0; z-index:0; background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 4px 4px; pointer-events:none; }

/* ARCADE HUD STACK */
.arcade-hud{ position:fixed; inset:0; z-index:100; pointer-events:none; padding:40px; display:flex; flex-direction:column; justify-content:space-between; opacity: var(--ui-op); transition: 0.5s; }
.hud-top{ display:flex; justify-content:space-between; }
.stat-box{ background:rgba(0,0,0,0.8); border-left:2px solid var(--c1); padding:10px 20px; font-family:'Orbitron'; font-size:10px; letter-spacing:2px; backdrop-filter:blur(10px); }

/* GAME OVERLAY CONTROLS */
.control-panel{ position:fixed; bottom:40px; right:40px; z-index:200; display:flex; flex-direction:column; gap:10px; pointer-events:all; }
.btn{ background:transparent; border:1px solid var(--c1); color:#fff; padding:15px 30px; font-family:'Orbitron'; cursor:pointer; transition:0.3s; letter-spacing:3px; font-size:10px; text-transform:uppercase; }
.btn:hover{ background:var(--c1); color:#000; box-shadow:0 0 30px var(--c1); }

#main-title{ font-family:'Orbitron'; font-weight:var(--f-weight); font-stretch: var(--f-width); font-size:clamp(3rem, 15vw, 10rem); letter-spacing:calc(var(--dim)*15px); text-shadow: 0 0 30px var(--c1); pointer-events:none; z-index:10; }
</style>
</head>
<body>
<div class='pixel-fill'></div>
<canvas id='v40-canvas'></canvas>

<div class='arcade-hud'>
    <div class='hud-top'>
        <div class='stat-box'>INTEGRITY: <span id='hp'>100</span>%</div>
        <div class='stat-box'>SCORE: <span id='score'>0</span></div>
    </div>
</div>

<div style='position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:10;'>
    <h1 id='main-title'>CORE</h1>
</div>

<div class='control-panel'>
    <button class='btn' onclick='game.init()'>Initialize Singularity</button>
    <button class='btn' onclick='game.burst()'>Neural Burst</button>
</div>

<script>
const canvas = document.getElementById('v40-canvas');
const ctx = canvas.getContext('2d');
let w, h, time=0, particles=[], enemies=[], isRunning=false, score=0, hp=100;

function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; } resize(); addEventListener('resize',resize);
for(let i=0;i<300;i++) particles.push({ x:Math.random()*w, y:Math.random()*h, z:Math.random()*w, r:Math.random()*2+1, c:Math.random()*360 });

const game = {
    init() { isRunning = true; score=0; hp=100; enemies=[]; document.getElementById('main-title').innerText = 'ACTIVE'; },
    burst() {
        if(!isRunning) return;
        enemies = [];
        score += 50;
        document.body.style.filter = 'invert(1) contrast(2)';
        setTimeout(() => document.body.style.filter = 'none', 100);
    }
};

function spawnEnemy() {
    if(!isRunning) return;
    const angle = Math.random() * Math.PI * 2;
    enemies.push({ x: w/2 + Math.cos(angle)*w, y: h/2 + Math.sin(angle)*h, s: 2 + (score/500) });
}
setInterval(spawnEnemy, 1000);

function draw(){
    time += 0.01; ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
    const cx = w/2, cy = h/2;

    // V40 Adaptive Font Logic
    document.documentElement.style.setProperty('--f-weight', Math.floor(100 + (Math.sin(time)+1)*400));

    particles.forEach(p => {
        p.z -= 5; if(p.z <= 0) p.z = w;
        let sc = 400/p.z; let x = (p.x - cx) * sc + cx; let y = (p.y - cy) * sc + cy;
        ctx.fillStyle = `hsla(${p.c}, 100%, 70%, ${1 - p.z/w})`;
        ctx.beginPath(); ctx.arc(x, y, sc * 1.5, 0, Math.PI*2); ctx.fill();
    });

    if(isRunning) {
        enemies.forEach((en, i) => {
            const dx = cx - en.x, dy = cy - en.y; const dist = Math.hypot(dx, dy);
            en.x += (dx/dist) * en.s; en.y += (dy/dist) * en.s;
            ctx.fillStyle = '#ff2e88'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff2e88';
            ctx.fillRect(en.x, en.y, 8, 8);
            if(dist < 50) { hp -= 10; enemies.splice(i, 1); if(hp <= 0) isRunning = false; }
        });
        document.getElementById('hp').innerText = hp; document.getElementById('score').innerText = score++;
    }
    requestAnimationFrame(draw);
}
draw();
<\/script>
</body>
</html>
