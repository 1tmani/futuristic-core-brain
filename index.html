<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>CORE-BRAIN V12 | SENSORY SUSPENSE</title>
    <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap' rel='stylesheet'>
    <style>
        :root { --c1: #00f2ff; --c2: #7000ff; --bg: #000; --speed: 1s; --blur: 0px; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; overflow-x: hidden; font-family: 'Orbitron', sans-serif; transition: filter 0.3s ease; }
        
        body.suspense { filter: blur(var(--blur)) brightness(0.8); }
        canvas { position: fixed; inset: 0; z-index: -1; }
        .page { height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-bottom: 1px solid rgba(0,242,255,0.05); }

        .motion-grid { position: fixed; inset: 0; display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); pointer-events: none; opacity: 0.1; }
        .grid-cell { border: 0.5px solid var(--c1); transition: transform 0.2s ease; }

        .hud-v12 { position: fixed; top: 30px; left: 30px; background: rgba(0,0,0,0.8); border-left: 3px solid var(--c1); padding: 15px; font-size: 10px; z-index: 1000; letter-spacing: 2px; }
        .status-blink { width: 8px; height: 8px; background: #0f0; border-radius: 50%; display: inline-block; margin-right: 10px; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .suspense-label { font-size: 5rem; font-weight: 900; text-transform: uppercase; transition: transform var(--speed) linear; }
    </style>
</head>
<body>
    <div class='hud-v12'>
        <div class='status-blink'></div> ENGINE: SUSPENSE_V12<br>
        STATUS: MOTION_SENSORS_ACTIVE<br>
        VELOCITY: <span id='speed-val'>0</span> km/ms<br>
        THEME: AUTO_UPGRADING
    </div>
    <div class='motion-grid' id='grid'></div>

    <section class='page'><h1 class='suspense-label'>SUSPENSE</h1></section>
    <section class='page'><h1>MOTION SENSOR</h1></section>
    <section class='page'><h1>AUTO UPGRADE</h1></section>
    <section class='page'><h1>NEURAL CAMERA</h1></section>

    <canvas id='v12-canvas'></canvas>

    <script>
        const grid = document.getElementById('grid');
        for(let i=0; i<100; i++) {
            let div = document.createElement('div');
            div.className = 'grid-cell';
            grid.appendChild(div);
        }

        let lastScroll = 0;
        window.addEventListener('scroll', () => {
            let currentScroll = window.scrollY;
            let diff = Math.abs(currentScroll - lastScroll);
            document.getElementById('speed-val').innerText = diff;
            document.documentElement.style.setProperty('--blur', (diff / 10) + 'px');
            if (diff > 50) document.body.classList.add('suspense');
            else document.body.classList.remove('suspense');
            lastScroll = currentScroll;
        });

        window.addEventListener('mousemove', (e) => {
            const cells = document.querySelectorAll('.grid-cell');
            cells.forEach((cell) => {
                let dist = Math.hypot(cell.offsetLeft - e.clientX, cell.offsetTop - e.clientY);
                if(dist < 200) {
                    cell.style.transform = `scale(1.5) rotate(${dist/10}deg)`;
                    cell.style.borderColor = 'var(--c2)';
                } else {
                    cell.style.transform = 'scale(1)';
                    cell.style.borderColor = 'var(--c1)';
                }
            });
        });

        const canvas = document.getElementById('v12-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        function draw() { ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width,canvas.height); requestAnimationFrame(draw); }
        draw();
    </script>
</body>
</html>
