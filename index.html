<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V64 | NEURAL-MORPH</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&display=swap' rel='stylesheet'>
<style>
:root{ --c1:#00f0ff; --c2:#8a2eff; --bg:#000; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.interface-layer{ position:fixed; inset:0; z-index:100; pointer-events:none; display:flex; flex-direction:column; justify-content:center; align-items:center; }
.morph-title{ font-family:'Orbitron'; font-size:clamp(2rem, 10vw, 8rem); letter-spacing:20px; text-transform:uppercase; text-shadow: 0 0 30px var(--c1); opacity:0.9; }
.hud-tag{ position:fixed; top:40px; left:40px; border-left:2px solid var(--c1); padding-left:20px; font-size:10px; letter-spacing:4px; text-transform:uppercase; }
</style>
</head>
<body>
<canvas id='morph-canvas'></canvas>
<div class='hud-tag'>INFRA: NEURAL_MORPH_V64<br>GEOMETRY: LIQUID_MESH<br>STATUS: EVOLVING</div>
<div class='interface-layer'>
    <h1 class='morph-title'>ORGANISM</h1>
</div>
<script>
const canvas=document.getElementById('morph-canvas'), ctx=canvas.getContext('2d');
let w, h, points=[], mouse={x:0, y:0};
function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; initMesh(); }
function initMesh(){
    points=[]; const spacing=50;
    for(let x=0; x<w+spacing; x+=spacing)
        for(let y=0; y<h+spacing; y+=spacing)
            points.push({x, y, ox:x, oy:y});
}
window.addEventListener('resize',resize);
window.addEventListener('mousemove',e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
resize();
function draw(){
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='rgba(0,240,255,0.15)'; ctx.lineWidth=0.5;
    points.forEach(p=>{
        const dx=mouse.x-p.ox, dy=mouse.y-p.oy, dist=Math.hypot(dx,dy);
        const f=Math.max(0, 150-dist)/150;
        p.x = p.ox + dx*f; p.y = p.oy + dy*f;
    });
    for(let i=0; i<points.length; i++){
        const p=points[i];
        if(points[i+1] && Math.abs(points[i+1].ox - p.ox) < 60){
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(points[i+1].x, points[i+1].y); ctx.stroke();
        }
    }
    requestAnimationFrame(draw);
} draw();
</script>
</body>
</html>
