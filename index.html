<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>HYPER CORE | DIMENSIONAL TRIGGER</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&display=swap' rel='stylesheet'>
<style>
:root{
     --c1:#00f0ff; --c2:#8a2eff; --bg:#000; --transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{ background:#000; color:#fff; font-family:'Michroma',sans-serif; overflow:hidden; }

canvas{ position:fixed; inset:0; z-index:0; transition: filter var(--transition); }
body.hyper canvas{ filter: contrast(1.2) brightness(1.1) hue-rotate(45deg); }

header{ position:fixed; top:0; width:100%; z-index:100; backdrop-filter:blur(30px); background:rgba(0,0,0,.4); border-bottom:1px solid rgba(255,255,255,.05); }
nav{ display:flex; justify-content:space-between; padding:25px 50px; align-items:center; }
.logo{ font-family:'Orbitron',sans-serif; letter-spacing:10px; font-weight:900; transition: var(--transition); }
body.hyper .logo{ letter-spacing:20px; color:var(--c1); text-shadow:0 0 20px var(--c1); }

.trigger-panel{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:10; pointer-events:none; }
.hyper-btn{ 
    pointer-events:all; background:transparent; border:1px solid #fff; color:#fff; padding:20px 40px; 
    font-family:'Orbitron'; letter-spacing:5px; cursor:pointer; transition: 0.4s; overflow:hidden; position:relative;
}
.hyper-btn:hover{ background:#fff; color:#000; box-shadow:0 0 30px #fff; }
body.hyper .hyper-btn{ opacity:0; pointer-events:none; transform: scale(2); }

.stats-box{ position:fixed; bottom:50px; left:50px; z-index:10; border-left:1px solid #fff; padding:20px; font-size:10px; letter-spacing:3px; opacity:0.5; transition: var(--transition); }
body.hyper .stats-box{ border-color:var(--c1); opacity:1; color:var(--c1); }
</style>
</head>
<body>
<canvas id='render'></canvas>
<header>
<nav><div class='logo'>HYPER CORE</div><div style='font-size:10px; opacity:0.5;' id='status'>MODE: STABLE</div></nav>
</header>

<div class='trigger-panel'>
    <button class='hyper-btn' onclick='activateHyperDrive()'>ENGAGE HYPER DRIVE</button>
</div>

<section class='stats-box'>
    DIMENSION: <span id='dim'>3D_NORMAL</span><br>
    NEURAL_SYNC: LOCKED
</section>

<script>
const canvas=document.getElementById('render');
const ctx=canvas.getContext('2d');
let w,h, time=0, isHyper=false, particles=[];

function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
resize(); addEventListener('resize',resize);

for(let i=0;i<150;i++){
     particles.push({ x:Math.random()*w, y:Math.random()*h, vx:Math.random()-0.5, vy:Math.random()-0.5, z:Math.random()*w });
}

function activateHyperDrive(){
    isHyper = true;
    document.body.classList.add('hyper');
    document.getElementById('status').textContent = 'MODE: 4D_HYPER_SPACE';
    document.getElementById('dim').textContent = '4D_WARP';
}

function draw(){
    time += 0.005;
    ctx.fillStyle = isHyper ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2;

    if(!isHyper){
        // Normal 3D Particle Field
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if(p.x<0||p.x>w) p.vx*=-1; if(p.y<0||p.y>h) p.vy*=-1;
            ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
        });
    } else {
        // 4D Dimensional Warp
        ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--c1')+'33';
        for(let i=0; i<30; i++){
            let dist = i * 25;
            let warp = Math.sin(time + i * 0.1) * 60;
            ctx.beginPath();
            ctx.ellipse(cx, cy, dist + warp, (dist * 0.5) + warp, Math.sin(time*0.5), 0, Math.PI*2);
            ctx.stroke();
        }
        particles.forEach(p => {
            p.z -= 15; if(p.z <= 0) p.z = w;
            let scale = 400 / p.z;
            let x2d = (p.x - cx) * scale + cx;
            let y2d = (p.y - cy) * scale + cy;
            ctx.fillStyle = `rgba(255,255,255,${1 - (p.z/w)})`;
            ctx.beginPath(); ctx.arc(x2d, y2d, scale, 0, Math.PI*2); ctx.fill();
        });
    }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
