<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V61 | SENSORY SYNC</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
<style>
:root{ --c1:#00f0ff; --c2:#8a2eff; --c3:#ff2e88; --bg: #000; --sync: 0; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.interface-hud{ position:fixed; inset:0; z-index:100; pointer-events:none; padding:40px; display:flex; flex-direction:column; justify-content:space-between; }
.stat-box{ background:rgba(0,0,0,0.85); border-left:2px solid var(--c1); padding:12px 25px; font-family:'Orbitron'; font-size:9px; letter-spacing:3px; backdrop-filter:blur(30px); }
.action-box{ position:fixed; bottom:40px; right:40px; z-index:100; border:1px solid var(--c1); padding:25px; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); pointer-events:all; }
.btn{ background:transparent; border:1px solid var(--c1); color:#fff; padding:12px 30px; cursor:pointer; font-family:'Orbitron'; letter-spacing:4px; transition:0.4s; font-size:10px; text-transform:uppercase; }
.btn:hover{ background:var(--c1); color:#000; box-shadow:0 0 40px var(--c1); }
#sync-status{ color:var(--c3); font-weight:800; }
</style>
</head>
<body>
<canvas id='neural-field'></canvas>
<div class='interface-hud'>
    <div style='display:flex; justify-content:space-between;'>
        <div class='stat-box'>NODE: V61_SENSORY</div>
        <div class='stat-box'>STABILITY: <span id='fps-val'>256Hz</span></div>
    </div>
    <div style='display:flex; justify-content:space-between;'>
        <div class='stat-box'>SYNC: <span id='sync-status'>DISCONNECTED</span></div>
        <div class='stat-box'>LATENCY: 0.004ms</div>
    </div>
</div>
<div class='action-box'>
    <button class='btn' onclick='engine.synchronize()'>Initialize Sync</button>
</div>
<script>
const canvas=document.getElementById('neural-field'), ctx=canvas.getContext('2d');
let w, h, time=0, isSynced=false, particles=[];
function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; } resize(); addEventListener('resize',resize);
for(let i=0;i<200;i++) particles.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2});
const engine = {
    synchronize() {
        isSynced = true;
        document.getElementById('sync-status').innerText = 'LOCKED';
        document.getElementById('sync-status').style.color = '#00ff75';
        const msg = new SpeechSynthesisUtterance('Sensory synchronization locked. High frequency neural field active.');
        msg.rate = 0.9; window.speechSynthesis.speak(msg);
    }
};
function draw(){
    time+=0.01; ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
    particles.forEach(p => {
        p.y -= isSynced ? 5 : 1; if(p.y < 0) p.y = h;
        ctx.fillStyle = isSynced ? 'var(--c1)' : 'rgba(255,255,255,0.2)';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(draw);
} draw();
<\/script>
</body>
</html>
