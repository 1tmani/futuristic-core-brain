<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V69 | SELF-PROMPTING ORGANISM</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap' rel='stylesheet'>
<style>
:root{ --c1: hsl(264, 100%, 50%); --bg: #000; }
body, html{ margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Orbitron'; overflow: hidden; }
canvas{ position: fixed; inset: 0; z-index: 1; }
.hud-v69{ position: fixed; top: 40px; left: 40px; z-index: 100; border-left: 2px solid var(--c1); padding-left: 20px; font-size: 10px; letter-spacing: 5px; }
.thought-bubble{ position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 100; opacity: 0.5; font-size: 8px; }
</style>
</head>
<body>
<div class='hud-v69'>SYSTEM: SELF_PROMPTING_V69<br>TRAIT: QUANTUM<br>HUE: 264</div>
<div class='thought-bubble'>CURRENT_PROMPT: "Mutate neural nodes to Quantum frequency"</div>
<canvas id='c'></canvas>
<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let w, h; function res(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; } res();
function draw(t){
    ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='var(--c1)';
    for(let i=0; i<20; i++){
        ctx.beginPath();
        let r = 100 + Math.sin(t*0.001 + i)*50;
        ctx.arc(w/2, h/2, r, 0, Math.PI*2);
        ctx.stroke();
    }
    requestAnimationFrame(draw);
} draw(0);
</script>
</body>
</html>
