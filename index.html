<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V68 | NEURAL TERMINAL</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
<style>
:root{ --c1:#00f0ff; --c2:#ff0055; --bg:#000; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Orbitron'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; opacity:0.4; }

/* TERMINAL UI */
.terminal-layer{ position:fixed; bottom:40px; left:40px; width:450px; height:300px; background:rgba(0,0,0,0.9); border:1px solid var(--c1); z-index:1000; display:flex; flex-direction:column; backdrop-filter:blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
.term-header{ padding:10px 15px; border-bottom:1px solid var(--c1); font-size:9px; letter-spacing:2px; display:flex; justify-content:space-between; background:rgba(0,240,255,0.05); }
.term-output{ flex:1; padding:15px; overflow-y:auto; font-family:'JetBrains Mono'; font-size:11px; color:var(--c1); line-height:1.6; }
.term-input-row{ padding:10px 15px; border-top:1px solid var(--c1); display:flex; gap:10px; }
.prompt{ color:var(--c1); font-family:'JetBrains Mono'; }
#cmd-input{ background:transparent; border:none; outline:none; color:#fff; font-family:'JetBrains Mono'; font-size:11px; width:100%; }

.central-node{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10; pointer-events:none; text-align:center; }
.sig-text{ font-size:clamp(2rem, 10vw, 6rem); letter-spacing:30px; text-shadow: 0 0 30px var(--c1); opacity:0.8; }
</style>
</head>
<body>
<canvas id='net-canvas'></canvas>

<div class='central-node'><h1 class='sig-text' id='main-title'>TERMINAL</h1></div>

<section class='terminal-layer'>
    <div class='term-header'><span>CORE_CLI_v1.1</span><span>● ONLINE</span></div>
    <div class='term-output' id='output'>
        <div>[INIT] Neural services started...</div>
        <div>[READY] Type 'HELP' for available protocols.</div>
    </div>
    <div class='term-input-row'>
        <span class='prompt'>></span>
        <input type='text' id='cmd-input' autofocus autocomplete='off' spellcheck='false'>
    </div>
</section>

<script>
const canvas=document.getElementById('net-canvas'), ctx=canvas.getContext('2d');
let w, h, particles=[];
function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
resize(); addEventListener('resize',resize);
for(let i=0;i<100;i++) particles.push({x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-0.5), vy:(Math.random()-0.5)});

const input = document.getElementById('cmd-input');
const output = document.getElementById('output');

input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') {
        const cmd = input.value.toUpperCase().trim();
        const line = document.createElement('div');
        line.textContent = `> ${cmd}`;
        output.appendChild(line);

        if(cmd === 'HELP') {
            print('PROTOCOLS: [THEME_RED], [THEME_CYAN], [CLEAR], [STATUS]');
        } else if(cmd === 'THEME_RED') {
            document.documentElement.style.setProperty('--c1', '#ff0055');
            print('COLOR_SHIFT: RED');
        } else if(cmd === 'THEME_CYAN') {
            document.documentElement.style.setProperty('--c1', '#00f0ff');
            print('COLOR_SHIFT: CYAN');
        } else if(cmd === 'CLEAR') {
            output.innerHTML = '';
        } else if(cmd === 'STATUS') {
            print('SYSTEM: STABLE | NODES: 100 | UPLINK: ACTIVE');
        } else {
            print('ERROR: UNKNOWN_PROTOCOL');
        }

        input.value = '';
        output.scrollTop = output.scrollHeight;
    }
});

function print(text) {
    const line = document.createElement('div');
    line.style.color = '#fff';
    line.textContent = `[SYS] ${text}`;
    output.appendChild(line);
}

function draw(){
    ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);
    particles.forEach((p,i) => {
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>w) p.vx*=-1; if(p.y<0||p.y>h) p.vy*=-1;
        ctx.fillStyle='var(--c1)'; ctx.beginPath(); ctx.arc(p.x,p.y,1,0,Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(draw);
} draw();
</script>
</body>
</html>
