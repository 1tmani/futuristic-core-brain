<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V65 | NEURAL NETWORKING</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@100&display=swap' rel='stylesheet'>
<style>
:root{ --c1:#00f0ff; --c2:#8a2eff; --bg:#000; }
body,html{ margin:0; padding:0; background:#000; color:#fff; font-family:'Orbitron'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.hud-layer{ position:fixed; inset:0; z-index:100; pointer-events:none; padding:40px; display:flex; flex-direction:column; justify-content:space-between; }
.top-bar{ display:flex; justify-content:space-between; border-bottom:1px solid rgba(0,240,255,0.2); padding-bottom:10px; }
.stat-box{ background:rgba(0,0,0,0.8); border-left:2px solid var(--c1); padding:10px 20px; font-size:10px; letter-spacing:3px; backdrop-filter:blur(10px); }
.main-display{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:10; pointer-events:none; }
.title-xl{ font-size:clamp(3rem, 12vw, 10rem); font-weight:900; letter-spacing:30px; opacity:0.8; text-shadow: 0 0 40px var(--c1); }
.mono-tag{ font-family:'JetBrains Mono'; font-size:10px; opacity:0.4; letter-spacing:10px; margin-top:20px; }
</style>
</head>
<body>
<canvas id='net-canvas'></canvas>
<div class='hud-layer'>
    <div class='top-bar'>
        <div class='stat-box'>CORE_V65_ULTRA</div>
        <div class='stat-box'>NODES: 256_ACTIVE</div>
    </div>
    <div class='top-bar' style='border:none; margin-top:auto;'>
        <div class='stat-box'>LATENCY: 0.0001ms</div>
        <div class='stat-box'>STABILITY: PEAK_STABLE</div>
    </div>
</div>
<div class='main-display'>
    <h1 class='title-xl'>NEURAL</h1>
    <div class='mono-tag'>QUANTUM_NETWORK_ESTABLISHED</div>
</div>
<script>
const canvas=document.getElementById('net-canvas'), ctx=canvas.getContext('2d');
let w, h, particles=[];
function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
resize(); addEventListener('resize',resize);
for(let i=0;i<150;i++) particles.push({x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2});
function draw(){
    ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);
    particles.forEach((p,i) => {
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>w) p.vx*=-1; if(p.y<0||p.y>h) p.vy*=-1;
        ctx.fillStyle='var(--c1)'; ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fill();
        for(let j=i+1;j<particles.length;j++){
            const p2=particles[j]; const d=Math.hypot(p.x-p2.x, p.y-p2.y);
            if(d<150){
                ctx.strokeStyle=`rgba(0,240,255,${1 - d/150})`;
                ctx.lineWidth=0.5; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
            }
        }
    });
    requestAnimationFrame(draw);
} draw();
</script>
</body>
</html>
