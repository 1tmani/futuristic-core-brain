<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>CORE V46 | 256HZ SINGULARITY</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
<style>
:root{
     --c1:#00f0ff; --c2:#8a2eff; --c3:#ff2e88; --c4:#00ff75; --dim: 1; --f-weight: 100; --bg: #000; --nexus-op: 1;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{ background:#000; color:#fff; font-family:'Michroma',sans-serif; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }

/* ELITE HUD STACK */
.interface-hud{ position:fixed; inset:0; z-index:100; pointer-events:none; padding:40px; display:flex; flex-direction:column; justify-content:space-between; }
.hud-top{ display:flex; justify-content:space-between; }
.stat-box{ background:rgba(0,0,0,0.8); border-left:2px solid var(--c1); padding:10px 20px; font-family:'Orbitron'; font-size:9px; letter-spacing:3px; backdrop-filter:blur(20px); }

.nightingale-particle{ position:fixed; width:2px; height:2px; background:#fff; border-radius:50%; box-shadow:0 0 10px var(--c1); z-index:5; pointer-events:none; }

.game-controls{ position:fixed; bottom:40px; right:40px; z-index:200; display:flex; gap:10px; pointer-events:all; }
.ctrl-btn{ background:rgba(255,255,255,0.05); border:1px solid var(--c1); color:#fff; padding:12px 25px; font-family:'Orbitron'; cursor:pointer; transition:0.3s; font-size:10px; letter-spacing:2px; }
.ctrl-btn:hover{ background:var(--primary); color:#000; box-shadow:0 0 20px var(--c1); }

/* MAGICKA SIGNAL OVERLAY */
.magicka-layer{ position:fixed; inset:0; z-index:2; border: 1px solid rgba(0,240,255,0.05); pointer-events:none; animation: pulseBorder 4s infinite alternate; }
@keyframes pulseBorder { from { opacity: 0.2; } to { opacity: 0.6; } }
</style>
</head>
<body>
<canvas id='v46-canvas'></canvas>
<div class='magicka-layer'></div>
<div class='interface-hud'>
    <div class='hud-top'>
        <div class='stat-box'>ENGINE: 256HZ_ADAPTIVE</div>
        <div class='stat-box'>STATUS: CORE_STABILIZED</div>
    </div>
    <div class='hud-top'>
        <div class='stat-box'>FPS: <span id='fps'>120</span></div>
        <div class='stat-box'>SYNC: NEURAL_MAPPING</div>
    </div>
</div>
<div class='game-controls'>
    <button class='ctrl-btn' onclick='engine.accelerate()'>THRUST</button>
    <button class='ctrl-btn' onclick='engine.decelerate()'>BRAKE</button>
    <button class='ctrl-btn' onclick='engine.rotate()'>REVOLVE 360</button>
</div>
<script>
const canvas = document.getElementById('v46-canvas');
const ctx = canvas.getContext('2d');
let w, h, time=0, particles=[], speed=5, carRot=0, isRevolving=false, audioCtx, masterGain;

function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
resize(); addEventListener('resize',resize);

for(let i=0; i<400; i++) particles.push({ x:Math.random()*w, y:Math.random()*h, z:Math.random()*w, c:Math.random()*360 });

const engine = {
    accelerate: () => speed = Math.min(speed + 2, 25),
    decelerate: () => speed = Math.max(speed - 2, 2),
    rotate: () => isRevolving = !isRevolving
};

function draw(){
    time += 0.01; 
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0,0,w,h);
    const cx = w/2, cy = h/2;

    // 360 Circular Emotional Field
    ctx.strokeStyle = `hsla(${time*50}, 100%, 50%, 0.1)`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, 200 + Math.sin(time)*50, 0, Math.PI*2);
    ctx.stroke();

    // 120-256Hz Particle Interpolation
    particles.forEach(p => {
        p.z -= speed; if(p.z <= 0) p.z = w;
        let sc = 400/p.z;
        let x2d = (p.x - cx) * sc + cx;
        let y2d = (p.y - cy) * sc + cy;

        if(isRevolving) {
            let dist = Math.hypot(x2d-cx, y2d-cy);
            let ang = Math.atan2(y2d-cy, x2d-cx) + 0.02;
            x2d = cx + Math.cos(ang) * dist;
            y2d = cy + Math.sin(ang) * dist;
        }

        ctx.fillStyle = `hsla(${p.c + time*20}, 80%, 70%, ${1 - p.z/w})`;
        ctx.fillRect(x2d, y2d, sc*1.5, sc*1.5);
    });

    // Rotating Rectangular Magicka Core
    ctx.save();
    ctx.translate(cx, cy); 
    ctx.rotate(time);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect(-50, -50, 100, 100);
    ctx.restore();

    requestAnimationFrame(draw);
}
draw();

// Automated Theme Mutation
setInterval(() => {
    const hue = Math.floor(Math.random()*360);
    document.documentElement.style.setProperty('--c1', `hsl(${hue}, 100%, 50%)`);
}, 5000);
</script>
</body>
</html>
